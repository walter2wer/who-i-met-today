<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fbfaf7">
<meta name="color-scheme" content="light">
<title>Who I Met · HiRey</title>
<style>
  :root{
    --ink:#161412; --ink-soft:rgba(22,20,18,.62); --ink-faint:rgba(22,20,18,.42);
    --gold:#d18a00; --blue:#2467e8; --green:#34c759; --purple:#7c4dff;
    --paper:#fbfaf7; --card:#ffffff; --line:rgba(22,20,18,.10); --line-2:rgba(22,20,18,.16);
    --shadow:0 18px 48px rgba(20,18,16,.18); --shadow-sm:0 8px 22px rgba(20,18,16,.12);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    --nav-h:60px; --max:480px; color-scheme:light;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.5}
  ::selection{background:var(--ink);color:var(--paper)}
  button{font-family:inherit}
  #app{max-width:var(--max);margin:0 auto;min-height:100vh;background:var(--paper);
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 28px)}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-faint);font-weight:600}
  .eyebrow.sec{display:block;margin:0 0 14px}
  @keyframes livedot{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,.5)}50%{box-shadow:0 0 0 5px rgba(52,199,89,.05)}}
  @keyframes cardin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  /* ---------- header ---------- */
  header{position:sticky;top:0;z-index:30;background:rgba(251,250,247,.85);
    backdrop-filter:saturate(160%) blur(12px);-webkit-backdrop-filter:saturate(160%) blur(12px);
    border-bottom:.5px solid var(--line);padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
    display:flex;align-items:center;gap:12px}
  .brand .t{font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:-.01em;
    line-height:1;display:flex;align-items:center;gap:8px}
  .brand .t .ld{width:8px;height:8px;border-radius:50%;background:var(--green);animation:livedot 2.4s infinite}
  .brand .sub{font-size:11.5px;color:var(--ink-faint);margin-top:5px;font-weight:500}
  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .hdr-count{text-align:right;font-size:12px;color:var(--ink-soft);line-height:1.2;font-weight:500}
  .hdr-count b{font-family:var(--serif);font-size:18px;color:var(--ink);font-weight:600;display:block}
  .add-btn{width:42px;height:42px;border-radius:50%;background:var(--ink);color:#fff;border:0;
    display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s}
  .add-btn:active{transform:scale(.92)}
  .add-btn svg{width:20px;height:20px}
  /* ---------- views ---------- */
  main{padding:22px 18px 26px}
  .view{display:none}
  .view.active{display:block}
  .view-title{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:-.01em;margin:6px 0 0;line-height:1.05}
  /* today hero */
  .hero{padding:4px 2px 22px;border-bottom:.5px solid var(--line);margin-bottom:24px}
  .hero h2{font-family:var(--serif);font-weight:600;font-size:27px;letter-spacing:-.01em;margin:8px 0 20px;line-height:1.12}
  .cap-row{display:flex;gap:10px;flex-wrap:wrap}
  .btn{font-size:14.5px;font-weight:600;padding:13px 22px;cursor:pointer;border:0;border-radius:999px;
    transition:transform .1s, box-shadow .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--ink);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-ghost{background:var(--card);color:var(--ink);border:.5px solid var(--line);box-shadow:var(--shadow-sm)}
  .btn svg{width:17px;height:17px}
  .btn-soft{width:100%;background:rgba(36,103,232,.08);color:var(--blue);box-shadow:none;border:0;justify-content:center}
  .btn-soft:active{background:rgba(36,103,232,.14)}
  .btn-soft svg{width:18px;height:18px}
  .or{display:flex;align-items:center;gap:10px;margin:14px 0 10px;color:var(--ink-faint);font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;font-weight:600}
  .or::before,.or::after{content:"";flex:1;height:.5px;background:var(--line)}
  .mic-row{display:flex;align-items:center;gap:14px;margin:2px 0 16px}
  .mic-btn{width:58px;height:58px;border-radius:50%;border:0;background:var(--ink);color:#fff;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;box-shadow:var(--shadow-sm);transition:transform .1s}
  .mic-btn:active{transform:scale(.93)}
  .mic-btn svg{width:25px;height:25px}
  .mic-btn.live{background:var(--green);animation:micpulse 1.5s infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,.5)}50%{box-shadow:0 0 0 14px rgba(52,199,89,0)}}
  .mic-hint{font-size:13.5px;color:var(--ink-soft);line-height:1.45}
  .privacy{font-size:12.5px;color:var(--ink-soft);margin-top:18px;display:flex;gap:8px;align-items:baseline;line-height:1.5;font-weight:500}
  .privacy svg{width:13px;height:13px;flex:0 0 auto;opacity:.5;transform:translateY(2px)}
  /* Share my card — prominent, labeled, on the default screen (the buried account-sheet entry was hard to find) */
  .share-me{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--card);
    border:.5px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:14px 15px;margin:18px 0 24px;cursor:pointer;font:inherit;color:var(--ink);transition:transform .1s}
  .share-me:active{transform:translateY(1px)}
  .share-me .ico{width:38px;height:38px;border-radius:50%;background:rgba(36,103,232,.1);color:var(--blue);display:grid;place-items:center;flex:0 0 auto}
  .share-me .ico svg{width:19px;height:19px}
  .share-me .txt{flex:1;min-width:0}
  .share-me .txt b{font-family:var(--serif);font-size:16px;font-weight:600;display:block;line-height:1.2}
  .share-me .txt small{font-size:12.5px;color:var(--ink-soft);display:block;margin-top:2px;line-height:1.35}
  .share-me .arr{width:16px;height:16px;color:var(--ink-faint);flex:0 0 auto}
  /* day label */
  .day-label{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
  .day-label .d{font-family:var(--serif);font-style:italic;font-size:18px;font-weight:500;white-space:nowrap}
  .day-label .c{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);white-space:nowrap;font-weight:600}
  .day-label::after{content:"";flex:1;height:.5px;background:var(--line)}
  /* meeting card */
  .card{background:var(--card);border-radius:18px;box-shadow:var(--shadow-sm);overflow:hidden;
    margin-bottom:16px;animation:cardin .42s cubic-bezier(.2,.8,.2,1) both}
  .card .ph{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:#f0ece2}
  .card .body{padding:13px 16px 16px}
  .card .who{display:flex;flex-wrap:wrap;gap:5px 16px;align-items:center;margin-bottom:6px}
  .chip{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink);cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;line-height:1.25}
  .chip:active{opacity:.6}
  .chip .pd{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .chip.add{font-family:var(--sans);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);font-weight:600}
  .card .cap{font-size:14.5px;color:var(--ink-soft);margin:0;line-height:1.5}
  .card .meta{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);margin-top:10px;font-weight:600}
  .meta-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
  .meta-row .meta{margin-top:0}
  .card-share{font-size:12.5px;font-weight:600;color:#fff;background:var(--ink);border:0;border-radius:999px;padding:8px 15px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
  .card-share svg{width:15px;height:15px}
  .card-share:active{transform:translateY(1px)}
  /* per-post visibility — synced photos are PRIVATE by default; this is the only path to public */
  .card-vis{font-size:11px;font-weight:600;letter-spacing:.03em;border:0;border-radius:999px;padding:6px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .card-vis svg{width:12px;height:12px}
  .card-vis.priv{background:rgba(22,20,18,.06);color:var(--ink-soft)}
  span.card-vis.priv{cursor:default}
  .card-vis.pub{background:rgba(52,199,89,.14);color:#1d7c3e}
  /* public/private picker in the capture sheet */
  .vis-pick{display:flex;flex-direction:column;gap:9px;margin-top:9px}
  .vis-opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;
    background:var(--card);border:.5px solid var(--line-2);border-radius:15px;padding:13px 14px;font:inherit;color:var(--ink);transition:border .12s,box-shadow .12s,background .12s}
  .vis-opt:active{transform:translateY(1px)}
  .vis-opt .vi{width:34px;height:34px;border-radius:50%;background:rgba(22,20,18,.05);color:var(--ink-soft);display:grid;place-items:center;flex:0 0 auto}
  .vis-opt .vi svg{width:17px;height:17px}
  .vis-opt .vt{flex:1;min-width:0}
  .vis-opt .vt b{font-size:14.5px;font-weight:600;display:block;line-height:1.25}
  .vis-opt .vt small{font-size:12px;color:var(--ink-soft);display:block;margin-top:2px;line-height:1.35}
  .vis-opt .vk{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line-2);flex:0 0 auto;position:relative;transition:border-color .12s}
  .vis-opt.on{border-color:var(--ink);box-shadow:0 0 0 2.5px rgba(22,20,18,.07)}
  .vis-opt.on .vk{border-color:var(--ink);background:var(--ink)}
  .vis-opt.on .vk::after{content:"";position:absolute;left:6px;top:3px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .vis-opt.on[data-pub="1"] .vi{background:rgba(52,199,89,.16);color:#1d7c3e}
  .vis-consent{font-size:12px;color:#8a5c00;background:rgba(209,138,0,.08);border:.5px solid rgba(209,138,0,.18);
    border-radius:12px;padding:10px 13px;margin-top:10px;line-height:1.45;font-weight:500}
  .btn-mic{width:100%;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:9px;background:rgba(52,199,89,.12);color:#1d7c3e;border:0;border-radius:14px;padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-mic svg{width:19px;height:19px;flex:0 0 auto}
  .btn-mic:active{transform:translateY(1px)}
  .btn-mic.live{background:var(--green);color:#fff;animation:micpulse 1.5s infinite}
  .crm-grid{display:grid;gap:10px;margin-top:14px}
  .crm-grid label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);font-weight:600}
  .crm-grid input{margin-top:5px}
  .cadence{display:flex;gap:8px;margin-top:4px}
  .cad{flex:1;font-size:13px;font-weight:600;padding:10px;border:.5px solid var(--line-2);background:var(--card);color:var(--ink);border-radius:12px;cursor:pointer;font-family:inherit}
  .cad.on{background:var(--green);color:#fff;border-color:transparent}
  .follow-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  /* stats */
  .stats{display:flex;background:var(--card);border-radius:16px;box-shadow:var(--shadow-sm);margin:18px 0 26px;overflow:hidden}
  .stat{flex:1;padding:15px 6px 13px;text-align:center;border-left:.5px solid var(--line)}
  .stat:first-child{border-left:0}
  .stat b{font-family:var(--serif);font-size:25px;font-weight:600;display:block;line-height:1}
  .stat span{font-size:9.5px;text-transform:uppercase;letter-spacing:.11em;color:var(--ink-faint);display:block;margin-top:7px;font-weight:600}
  /* people grid */
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px 14px}
  .person{cursor:pointer;animation:cardin .42s cubic-bezier(.2,.8,.2,1) both}
  .ava-wrap{position:relative;width:84%;margin:0 auto}
  .ava{width:100%;aspect-ratio:1;border-radius:50%;object-fit:cover;background:#fff;display:block}
  .ava-fb{display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:24px}
  .person .nm{font-family:var(--serif);font-size:15px;font-weight:600;margin-top:12px;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .person .ct{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);text-align:center;margin-top:3px;font-weight:600}
  .dot{position:absolute;bottom:4px;right:4px;width:14px;height:14px;border-radius:50%;background:var(--green);
    border:2.5px solid var(--paper);animation:livedot 2.4s infinite}
  /* empty */
  .empty{text-align:center;color:var(--ink-soft);padding:50px 24px}
  .empty .ico{width:46px;height:46px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;
    background:rgba(52,199,89,.12);color:var(--green)}
  .empty .ico svg{width:22px;height:22px}
  .empty h3{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--ink);margin:0 0 7px}
  .empty p{margin:0 auto;font-size:14px;max-width:240px;line-height:1.55;font-weight:500}
  /* ---------- floating nav ---------- */
  nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 10px);
    width:calc(100% - 24px);max-width:calc(var(--max) - 20px);height:var(--nav-h);
    background:rgba(251,250,247,.9);backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);
    border:.5px solid var(--line);border-radius:22px;box-shadow:var(--shadow);display:flex;z-index:40}
  .tab{flex:1;background:none;border:0;cursor:pointer;color:var(--ink-faint);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:4px}
  .tab svg{width:21px;height:21px}
  .tab span{font-size:10.5px;font-weight:600;letter-spacing:.01em}
  .tab.active{color:var(--ink)}
  .tab.active svg{stroke-width:2}
  /* ---------- sheets ---------- */
  .scrim{position:fixed;inset:0;background:rgba(22,20,18,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(2px)}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(100%);bottom:0;width:100%;
    max-width:var(--max);background:var(--paper);z-index:60;border-radius:24px 24px 0 0;
    padding:8px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -12px 44px rgba(20,18,16,.22);
    transition:transform .3s cubic-bezier(.2,.8,.2,1);max-height:93vh;overflow-y:auto}
  .sheet.show{transform:translateX(-50%) translateY(0)}
  .grip{width:38px;height:4px;border-radius:999px;background:var(--line-2);margin:9px auto 16px}
  .sheet h2{font-family:var(--serif);font-size:25px;font-weight:600;letter-spacing:-.01em;margin:0 0 16px}
  .preview-wrap{margin-bottom:16px}
  .preview-wrap img{width:100%;display:block;max-height:46vh;object-fit:cover;border-radius:16px}
  .field-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--ink-faint);margin:0 0 9px;font-weight:600}
  input[type=text],textarea{width:100%;font-family:inherit;font-size:16px;padding:13px 16px;border-radius:14px;
    border:.5px solid var(--line-2);background:var(--card);color:var(--ink);outline:none;transition:border .15s,box-shadow .15s}
  input[type=text]::placeholder{color:var(--ink-faint)}
  input[type=text]:focus,textarea:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(22,20,18,.06)}
  textarea{resize:vertical;min-height:66px;line-height:1.5}
  .added{display:flex;flex-wrap:wrap;gap:8px;margin:13px 0 0}
  .added .tag{font-family:var(--serif);font-size:15px;font-weight:600;border-radius:999px;padding:7px 14px;cursor:pointer;
    display:inline-flex;gap:8px;align-items:center}
  .added .tag .x{font-family:var(--sans);font-size:13px;font-weight:600;opacity:.6}
  .suggest{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
  .suggest .s{background:var(--card);border:.5px solid var(--line);color:var(--ink-soft);font-size:13.5px;font-weight:500;
    padding:7px 14px;cursor:pointer;border-radius:999px;box-shadow:var(--shadow-sm)}
  .suggest .s:hover{color:var(--ink)}
  .suggest .s.hi{display:inline-flex;align-items:center;gap:7px;border-color:rgba(36,103,232,.28);color:var(--ink)}
  .suggest .s.hi .s-tag{font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--blue);background:rgba(36,103,232,.12);padding:2px 6px;border-radius:999px}
  .suggest .s-load{align-self:center;font-size:11.5px;color:var(--ink-faint);font-weight:500;padding:7px 4px;display:inline-flex;align-items:center;gap:6px}
  .suggest .s-load::before{content:"";width:9px;height:9px;border-radius:50%;border:1.5px solid var(--line-2);border-top-color:var(--blue);animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sheet-actions{display:flex;gap:10px;margin-top:20px}
  .sheet-actions .btn{flex:1}
  .hidden{display:none!important}
  /* person detail */
  .pd-head{display:flex;align-items:center;gap:15px;margin-bottom:2px}
  .pd-head .ava{width:62px;height:62px;flex:0 0 auto}
  .pd-head .nm{font-family:var(--serif);font-size:24px;font-weight:600;line-height:1.1}
  .pd-head .ct{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);margin-top:6px;font-weight:600}
  .pd-actions{display:flex;gap:8px;margin:18px 0;flex-wrap:wrap}
  .dot.inv{background:var(--gold);animation:none}
  .mini{font-size:12.5px;font-weight:600;padding:9px 15px;border:.5px solid var(--line-2);
    background:var(--card);color:var(--ink);cursor:pointer;border-radius:999px;box-shadow:var(--shadow-sm)}
  .mini.on{background:var(--green);color:#fff;border-color:transparent}
  .thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
  .thumbs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:13px}
  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 30px);transform:translateX(-50%) translateY(18px);
    background:var(--ink);color:#fff;font-size:14px;font-weight:500;padding:12px 20px;border-radius:999px;
    z-index:80;opacity:0;transition:all .25s;max-width:88%;text-align:center;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ---------- account / sign-in ---------- */
  .acct-btn{display:flex;align-items:center;gap:7px;background:none;border:0;cursor:pointer;padding:0;font:inherit;color:inherit;text-align:left}
  .acct-ava{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:13px;flex:0 0 auto;background:rgba(36,103,232,.12);color:var(--blue);box-shadow:0 0 0 1.5px var(--line)}
  .acct-ava.live{box-shadow:0 0 0 2px var(--green)}
  .acct-ava img{width:100%;height:100%;border-radius:50%;object-fit:cover}
  .seg{display:flex;gap:6px;background:rgba(22,20,18,.05);padding:4px;border-radius:14px;margin:2px 0 18px}
  .seg button{flex:1;border:0;background:none;cursor:pointer;font:inherit;font-size:13.5px;font-weight:600;color:var(--ink-soft);padding:9px 4px;border-radius:11px;transition:background .15s,color .15s}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}
  .auth-msg{font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin:0 0 16px}
  .auth-msg b{color:var(--ink);font-weight:600}
  .btn-google{width:100%;background:var(--card);color:var(--ink);border:.5px solid var(--line-2);box-shadow:var(--shadow-sm);gap:10px}
  .btn-google svg{width:18px;height:18px}
  .acct-card{display:flex;align-items:center;gap:14px;padding:4px 0 6px}
  .acct-card .big{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:21px;flex:0 0 auto;background:rgba(36,103,232,.12);color:var(--blue);box-shadow:0 0 0 2px var(--green)}

<script>
"use strict";
/* ========================= storage (IndexedDB) ========================= */
const DB_NAME="wimt-db", DB_VER=1; let _db=null;
function openDB(){ return new Promise((res,rej)=>{ const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{ const db=e.target.result;
    if(!db.objectStoreNames.contains("people")) db.createObjectStore("people",{keyPath:"id"});
    if(!db.objectStoreNames.contains("meetings")){ const s=db.createObjectStore("meetings",{keyPath:"id"}); s.createIndex("createdAt","createdAt"); } };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function store(s,m){ return _db.transaction(s,m).objectStore(s); }
function dbGetAll(s){ return new Promise((res,rej)=>{ const r=store(s,"readonly").getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function dbPut(s,v){ return new Promise((res,rej)=>{ const r=store(s,"readwrite").put(v); r.onsuccess=()=>res(v); r.onerror=()=>rej(r.error); }); }
function dbDel(s,k){ return new Promise((res,rej)=>{ const r=store(s,"readwrite").delete(k); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }

/* ========================= Hi platform (optional cloud sync) ========================= */
/* On-device first: nothing leaves this device until you sign in. Signing in only
   unlocks (1) your real HiRey profile on the we-met cards, and (2) sending a
   real, consented claim to a person you met (they get to accept or decline). */
const HI={
  base:"https://hi.hirey.ai",
  KEY:"wimt_hi",
  profile:null,            // cached owner_profile once signed in
  consent:new Map(),       // norm(name) -> consent_state ('approved'|'declined'|'pending')
  session(){ try{ return JSON.parse(localStorage.getItem(this.KEY)||"null"); }catch(_){ return null; } },
  save(s){ localStorage.setItem(this.KEY,JSON.stringify(s)); },
  clear(){ localStorage.removeItem(this.KEY); this.profile=null; this.consent.clear(); },
  authed(){ const s=this.session(); return !!(s&&s.access_token&&(!s.expires_at||s.expires_at>Date.now())); },
  myName(){ return (this.profile&&this.profile.display_name)||(this.session()&&this.session().display_name)||""; },
  async post(path,body,withAuth){
    const headers={"content-type":"application/json"};
    if(withAuth){ const s=this.session(); if(s&&s.access_token) headers.authorization="Bearer "+s.access_token; }
    // /api/* is OUR backend (CloudFront → secretary): same-origin on hirey.ai, but ABSOLUTE to
    // hirey.ai when this app runs on another origin (e.g. hub.hirey.ai/wim migrating old data up —
    // backend allows *.hirey.ai cross-origin + Bearer). /v1/* + capabilities → Hi platform (this.base).
    const apiHost=(location.origin==="https://hirey.ai")?"":"https://hirey.ai";
    const url=/^\/api\//.test(path)?(apiHost+path):(this.base+path);
    const r=await fetch(url,{method:"POST",headers,body:JSON.stringify(body||{})});
    let j={}; try{ j=await r.json(); }catch(_){}
    if(!r.ok){ const e=new Error(j.error||j.error_code||("http_"+r.status)); e.status=r.status; e.body=j; throw e; }
    return j;
  },
  // capability call -> returns the inner `result` object, throws on error envelope
  async call(cap,body){
    const j=await this.post("/v1/capabilities/"+cap+"/call",body,true);
    if(j&&j.error){ const e=new Error(j.error); e.body=j; throw e; }
    return (j&&j.result)||j;
  },
  onToken(tok){
    const ttl=(tok.expires_in||86400)*1000;
    this.save({ access_token:tok.access_token, expires_at:Date.now()+ttl-60000,
      agent_id:tok.agent_id, workspace_id:tok.workspace_id, customer_id:tok.customer_id||tok.owner_customer_id||(this.session()&&this.session().customer_id)||null,
      display_name:(this.session()&&this.session().display_name)||"" });
  },
};

/* ========================= MET cloud backend (/api/met/*) =========================
   Cross-device source of truth for the structured records: people, tags, notes, and
   text-only meetings. SAME-ORIGIN relative paths (hirey.ai → CloudFront → secretary),
   bearer = HI.session().access_token. Offline-first: every call is best-effort and
   NEVER throws to the caller — the local IndexedDB write is the one that must succeed.
   Photo BYTES never go here (they ride hi.owner-images); a meeting only carries its
   image_id/hiImageId so the photo can be re-fetched cross-device.
   extra_json carries the WHOLE app object losslessly; named columns are query helpers. */
const MET={
  // person → backend body. extra_json is the full app person object (round-trips losslessly).
  personBody(p){ return {
    id:p.id, name:p.name||"", name_lower:p.nameLower||norm(p.name||""),
    headline:p.headline||"", title:p.title||"", note:p.note||"", contact:p.contact||"",
    follow_cadence:p.followCadence||"off", last_ping:p.lastPing||0,
    hi_owner_json:JSON.stringify(p.hiOwner||null), extra_json:JSON.stringify(p) }; },
  // meeting → backend body. NO photo Blob; extra_json holds the structural fields only.
  meetingBody(m){ return {
    id:m.id, created_at:m.createdAt||Date.now(), caption:m.caption||"",
    image_id:m.hiImageId||null, public:m.hiPublic?1:0, person_ids:m.personIds||[],
    extra_json:JSON.stringify({ id:m.id, createdAt:m.createdAt, caption:m.caption,
      personIds:m.personIds, hiImageId:m.hiImageId, hiPublic:m.hiPublic }) }; },
  // backend person row → app person object. extra_json is the truth; named cols are fallback.
  personFromRow(row){ if(!row) return null;
    if(row.extra_json){ try{ const p=JSON.parse(row.extra_json); if(p&&p.id) return p; }catch(_){} }
    let hiOwner=null; try{ hiOwner=row.hi_owner_json?JSON.parse(row.hi_owner_json):null; }catch(_){}
    return { id:row.id, name:row.name||"", nameLower:row.name_lower||norm(row.name||""),
      headline:row.headline||"", title:row.title||"", note:row.note||"", contact:row.contact||"",
      phone:"", email:"", introBy:"", followCadence:row.follow_cadence||"off",
      lastPing:row.last_ping||0, hiOwner, createdAt:row.created_at||Date.now() }; },
  // backend meeting row → app meeting object (no Blob; personIds reconciled from tags later).
  meetingFromRow(row){ if(!row) return null; let x={};
    if(row.extra_json){ try{ x=JSON.parse(row.extra_json)||{}; }catch(_){} }
    return { id:row.id||x.id, createdAt:row.created_at||x.createdAt||Date.now(),
      caption:(row.caption!=null?row.caption:x.caption)||"",
      hiImageId:row.image_id||x.hiImageId||null,
      hiPublic:(row.public!=null?!!row.public:!!x.hiPublic),
      personIds:Array.isArray(row.person_ids)?row.person_ids:(x.personIds||[]) }; },
  async state(){ if(!HI.authed()) return null;
    try{ return await HI.post("/api/met/state",{},true); }catch(_){ return null; } },
  async putPerson(p){ if(!HI.authed()||!p) return null;
    try{ return await HI.post("/api/met/person",this.personBody(p),true); }catch(_){ return null; } },
  async delPerson(id){ if(!HI.authed()||!id) return null;
    try{ return await HI.post("/api/met/person/"+encodeURIComponent(id)+"/delete",{},true); }catch(_){ return null; } },
  async putMeeting(m){ if(!HI.authed()||!m) return null;
    try{ return await HI.post("/api/met/meeting",this.meetingBody(m),true); }catch(_){ return null; } },
  async delMeeting(id){ if(!HI.authed()||!id) return null;
    try{ return await HI.post("/api/met/meeting/"+encodeURIComponent(id)+"/delete",{},true); }catch(_){ return null; } },
  // Bulk-push in SMALL batches: a single body with a whole diary can exceed an edge body-size limit
  // (CloudFront/WAF returns 403 for large POSTs). 25 rows/request keeps every batch well under any cap.
  // Persons first, then meetings (so tags resolve to existing persons). Returns {ok:true} only if EVERY
  // batch succeeded — else null, so migrate/self-heal leaves the flag unset and retries.
  async importAll(persons,meetings){ if(!HI.authed()) return null;
    const CH=25;
    const send=async(p,m)=>{ try{ return await HI.post("/api/met/import",{
      persons:(p||[]).map(x=>this.personBody(x)), meetings:(m||[]).map(x=>this.meetingBody(x)) },true); }catch(_){ return null; } };
    persons=persons||[]; meetings=meetings||[];
    if(!persons.length && !meetings.length) return await send([],[]);
    let okAll=true;
    for(let i=0;i<persons.length;i+=CH){ if(!await send(persons.slice(i,i+CH),[])) okAll=false; }
    for(let i=0;i<meetings.length;i+=CH){ if(!await send([],meetings.slice(i,i+CH))) okAll=false; }
    return okAll?{ok:true}:null; },
};

/* Write wrappers: local IndexedDB stays the must-succeed write; the cloud push is
   fire-and-forget (never blocks, never throws). All dbPut/dbDel call points for
   people & meetings go through these so every local mutation also reaches the server. */
async function savePerson(p){ const r=await dbPut("people",p); if(HI.authed()) MET.putPerson(p); return r; }
async function removePerson(id){ const r=await dbDel("people",id); if(HI.authed()) MET.delPerson(id); return r; }
async function saveMeeting(m){ const r=await dbPut("meetings",m); if(HI.authed()) MET.putMeeting(m); return r; }
async function removeMeeting(id){ const r=await dbDel("meetings",id); if(HI.authed()) MET.delMeeting(id); return r; }

// First-login migration: push this device's local IndexedDB (people + meetings) to the cloud
// once per device per account. import is idempotent (upsert by id) so a re-run is harmless.
function _migFlag(){ const s=HI.session()||{}; return "wimt_migrated_v2_"+(s.customer_id||s.workspace_id||s.agent_id||"me"); }
// Scan ALL IndexedDB databases on THIS origin (not just 'wimt-db'): an old app — e.g. the hub version
// that wrote the user's original diary — may have used a different DB name, so its people live in a
// database this app never opens. Returns the database with the most people + a per-DB breakdown.
async function scanLocalDiary(){
  let dbs=[]; try{ dbs=await indexedDB.databases(); }catch(_){}
  if(!dbs||!dbs.length) dbs=[{name:DB_NAME}];
  const all=[]; let best={people:[],meetings:[],db:""};
  for(const d of dbs){ const name=d&&d.name; if(!name) continue; let db;
    try{ db=await new Promise((ok,no)=>{ const r=indexedDB.open(name); r.onsuccess=()=>ok(r.result); r.onerror=()=>no(r.error); }); }catch(_){ all.push({db:name,people:0,err:1}); continue; }
    try{ const stores=[...db.objectStoreNames];
      const get=s=>new Promise(ok=>{ try{ const r=db.transaction(s,"readonly").objectStore(s).getAll(); r.onsuccess=()=>ok(r.result||[]); r.onerror=()=>ok([]); }catch(_){ ok([]); } });
      const people=stores.includes("people")?await get("people"):[];
      const meetings=stores.includes("meetings")?await get("meetings"):[];
      const withPhoto=meetings.filter(m=>m&&m.photo&&(typeof Blob!=="undefined")&&(m.photo instanceof Blob||(m.photo&&m.photo.size))).length;
      all.push({db:name,people:people.length,meetings:meetings.length,withPhoto});
      if(people.length>best.people.length) best={people,meetings,db:name,withPhoto};
    }catch(_){ all.push({db:name,people:0,err:1}); }
    try{ db.close(); }catch(_){}
  }
  best.all=all; return best;
}
// Diagnostic (opt-in via ?diag): a one-line, on-screen summary of THIS device's local storage —
// people / meetings / how many carry a photo Blob — so "are my photos actually on this device?"
// is answered without the console. Tap to dismiss; auto-hides after 20s.
async function showStorageDiag(){
  try{ if(document.getElementById("storeDiag")) return;
    const f=await scanLocalDiary();
    // Link analysis on the richest DB: do the photo-bearing meetings actually point at people we have?
    let analysis="";
    try{
      const ppl=f.people||[], mts=f.meetings||[];
      const ids=new Set(ppl.map(p=>p&&p.id).filter(Boolean));
      const photoMts=mts.filter(m=>m&&m.photo&&(m.photo instanceof Blob||(m.photo&&m.photo.size)));
      const linked=photoMts.filter(m=>(m.personIds||[]).some(id=>ids.has(id))).length;
      const orphan=photoMts.length-linked;
      const peopleWithPhoto=ppl.filter(p=>p&&p.id&&photoMts.some(m=>(m.personIds||[]).includes(p.id))).length;
      analysis=" || links: "+peopleWithPhoto+"/"+ppl.length+" people show a photo, "+orphan+" orphan photos";
    }catch(_){}
    const line=((f.all||[]).map(x=>x.db+": "+(x.err?"err":(x.people+" people / "+x.meetings+" moments / "+(x.withPhoto||0)+" with photo"))).join("   ·   ")||"no local databases")+analysis;
    // In-memory health = what actually RENDERS (after the sign-in merge), vs the disk line above.
    // If MEM shows 0 photos / 0 linked while disk is healthy, the merge dropped the link in memory.
    const memHealth=()=>{ try{
      const P=state.people||[], LM=state.meetings||[], R=state.remote||[];
      const lp=LM.filter(m=>m&&m.photo);
      const linkedPpl=P.filter(p=>p&&p.id&&lp.some(m=>(m.personIds||[]).includes(p.id))).length;
      const noPhoto=P.find(p=>p&&p.id&&!lp.some(m=>(m.personIds||[]).includes(p.id)));
      // DOM layer: what the People grid actually rendered (img vs initials, and did the imgs load?)
      let dom="";
      try{ const avs=[].slice.call(document.querySelectorAll('.person .ava'));
        const imgs=avs.filter(a=>a.tagName==='IMG');
        const ok=imgs.filter(a=>a.complete&&a.naturalWidth>0).length;
        const broken=imgs.filter(a=>a.complete&&a.naturalWidth===0).length;
        dom=" | DOM "+avs.length+"ava/"+imgs.length+"img("+ok+"ok,"+broken+"broken)";
      }catch(_){}
      // first person WITH a local photo (should render an img) — what does latestPhotoFor give it?
      let ex="";
      const withP=P.find(p=>p&&p.id&&lp.some(m=>(m.personIds||[]).includes(p.id)));
      if(withP){ let r=""; try{ r=latestPhotoFor(withP.id)||""; }catch(e){ r="err"; }
        ex=" | ex \""+String(withP.name||"?").slice(0,9)+"\" lpf="+(r?r.slice(0,12):"EMPTY"); }
      return "MEM "+P.length+"ppl / "+LM.length+"local("+lp.length+"📷) / "+R.length+"remote / "+linkedPpl+" linked"+dom+ex;
    }catch(e){ return "MEM err "+e; } };
    const el=document.createElement("div"); el.id="storeDiag";
    el.style.cssText="position:fixed;left:8px;right:8px;top:8px;z-index:99998;background:#111;color:#fff;padding:11px 13px;"
      +"border-radius:12px;font:600 12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;box-shadow:0 6px 22px rgba(0,0,0,.3)";
    const paint=()=>{ el.innerHTML='DISK — '+esc(line)+'<br>'+esc(memHealth())+' <span style="opacity:.55">· tap to close</span>'; };
    paint(); el.onclick=()=>{ try{ el.remove(); clearInterval(iv); }catch(_){} };
    document.body.appendChild(el);
    // refresh for ~16s; ALSO force a renderAll each tick — if the grid was stale (rendered before
    // the photos were ready), this re-renders it with the now-healthy state and the DOM line proves it.
    const iv=setInterval(()=>{ if(!document.body.contains(el)){ clearInterval(iv); return; } try{ renderAll(); }catch(_){} paint(); }, 1500);
    setTimeout(()=>{ try{ clearInterval(iv); el.remove(); }catch(_){} }, 30000);
  }catch(_){}
}
// On-screen banner (mobile-friendly, no console) when this browser holds people not yet on the cloud:
// shows which local DB they're in + a one-tap Sync, so the data is never invisible.
async function showMigrateBanner(){
  try{ if(!HI.authed()||document.getElementById("migBanner")) return;
    const found=await scanLocalDiary(); if(!found.people.length) return;
    const onCloud=new Set(state.people.map(p=>p.id));
    if(!found.people.some(p=>p.id&&!onCloud.has(p.id))) return;   // all already synced
    const diag=found.all.map(x=>x.db+":"+(x.err?"err":x.people+"p")).join("  ");

async function migrateLocalToServer(){
  if(!HI.authed()) return;
  if(localStorage.getItem(_migFlag())) return;
  try{
    const found=await scanLocalDiary();
    const people=found.people, meetings=found.meetings;
    if(!people.length && !meetings.length){ localStorage.setItem(_migFlag(),String(Date.now())); return; }
    // MET.importAll swallows errors → returns null on failure. ONLY mark migrated on a real success,
    // else leave the flag unset so it retries next sign-in/boot (a failed first try must not poison it).
    const res=await MET.importAll(people,meetings);
    if(res){ localStorage.setItem(_migFlag(),String(Date.now())); toast(`Synced ${people.length} people to your account`); }
  }catch(_){ /* leave the flag unset so we retry */ }
}

/* ========================= server-side photo sync (hi.owner-images) =========================
   Offline-first: the photo always lives in IndexedDB. When signed in, we ALSO push a
   copy to the user's OWN Hi owner-images so it survives a device change. Hard rules:
   - PRIVATE by default. A moment is only ever public if the user EXPLICITLY chose it —
     either "Post to the public feed" at save time (meeting.hiPublic===true), or later by
     tapping the per-card "Private" pill (see publishMeetingToFeed).
   - feed-eligibility is locked PER IMAGE at UPLOAD time and can't be flipped afterward:
       request_public_on_approve:true  + feed_eligible:true → after AI approve the image
                                          auto-goes public + enters the platform /met feed.
       request_public_on_approve:false → stays private + review_status=pending forever;
                                          a later set_visibility=public will NOT push that
                                          image into the feed.
     => So promoting an existing private post to the feed is done NOT by toggling its image,
        but by RE-UPLOADING the photo as a fresh feed-eligible image (publishMeetingToFeed).
        The save-sheet choice just decides the flags on the first upload.
   - This is the user's OWN photo (their post, like an IG post). No faceprints, no 1:N
     face search, no identity index — just bytes the user chose to keep in their account.
   Flow: presign_upload(kind:'post') → S3 PUT → finalize_upload(image_id).
   The returned oi_xxx is written back onto the meeting record so we never re-upload. */
function blobDims(blob){ return new Promise(res=>{ try{ const u=URL.createObjectURL(blob), img=new Image();
  img.onload=()=>{ const d={w:img.naturalWidth||0,h:img.naturalHeight||0}; URL.revokeObjectURL(u); res(d); };
  img.onerror=()=>{ URL.revokeObjectURL(u); res({w:0,h:0}); }; img.src=u; }catch(_){ res({w:0,h:0}); } }); }
function mimeOf(blob){ const t=(blob&&blob.type||"").toLowerCase();
  return (t==="image/jpeg"||t==="image/png"||t==="image/webp"||t==="image/gif")?t:"image/jpeg"; }
function extFor(mime){ return ({"image/jpeg":"jpg","image/png":"png","image/webp":"webp","image/gif":"gif"})[mime]||"jpg"; }
// Upload one meeting's photo to the signed-in user's own Hi account. Returns oi_xxx or null.
// Public vs private is decided ONCE here, from meeting.hiPublic (the choice made in the save
// sheet). It cannot be changed afterward to ADD a post to the public feed.
async function uploadMeetingPhoto(meeting){
  if(!HI.authed() || !meeting || !meeting.photo || meeting.hiImageId) return meeting&&meeting.hiImageId||null;
  const blob=meeting.photo, mime=mimeOf(blob);
  const wantPublic=!!meeting.hiPublic;   // default false → private diary only
  let dims={w:0,h:0}; try{ dims=await blobDims(blob); }catch(_){}
  // 1) presign — the public/private decision is LOCKED IN here:
  //    request_public_on_approve:true  → after AI approve, auto-public + enters /met feed.
  //    request_public_on_approve:false → stays private + pending; never reaches the feed,
  //                                       and a later set_visibility=public won't change that.
  //    feed_eligible:true only matters when public; harmless when private.
  const pre=await HI.call("hi.owner-images",{ action:"presign_upload", kind:"post",
    original_filename:"who-i-met-"+meeting.id+"."+extFor(mime), mime_type:mime,
    size_bytes:blob.size||undefined, width:dims.w||undefined, height:dims.h||undefined,
    request_public_on_approve:wantPublic, feed_eligible:wantPublic });
  const img=pre.image||pre, up=pre.upload||{};
  const imageId=img.id||img.image_id; const putUrl=up.url||up.upload_url||up.put_url;
  if(!imageId||!putUrl){ throw new Error("presign_missing_fields"); }
  // 2) PUT bytes straight to S3 with exactly the headers Hi told us to use.
  const headers=Object.assign({"content-type":mime}, up.required_headers||up.headers||{});
  const put=await fetch(putUrl,{ method:"PUT", body:blob, headers });
  if(!put.ok){ throw new Error("s3_put_"+put.status); }
  // 3) finalize — Hi HEADs the object + runs AI moderation. If wantPublic and the AI
  //    approves, the image auto-goes public + enters the /met feed within seconds. If
  //    private, it stays private+pending. No staff action either way.
  await HI.call("hi.owner-images",{ action:"finalize_upload", image_id:imageId, reported_size_bytes:blob.size||undefined });
  return imageId;
}
// Fire-and-forget after a local save: never blocks, never throws to the caller.
async function syncMeetingToHi(meeting){
  if(!HI.authed() || !meeting || !meeting.photo || meeting.hiImageId) return;
  try{
    const id=await uploadMeetingPhoto(meeting);
    if(id){ meeting.hiImageId=id; meeting.hiSyncedAt=Date.now();
      try{ await saveMeeting(meeting); }catch(_){} }   // also pushes the new image_id to the cloud backend
  }catch(e){ /* offline / transient — local copy is intact, retried on next save or via syncPendingPhotos */ }
}
// Backfill: push any signed-in user's local photos that aren't on the server yet, so the photo
// BYTES (not just names) reach the cloud and render on every device + on hirey.ai/met. Uploaded
// PRIVATE (wantPublic=!!m.hiPublic, default false) — a personal diary, never the public feed.
// Was strictly sequential (N×latency → minutes on a phone, dies if the tab is backgrounded mid-run);
// now concurrency-capped parallel + an on-screen progress bar so the user keeps the page open
// until every photo lands. Idempotent: each meeting skips once it has an hiImageId, so re-running
// resumes where it left off.
async function syncPendingPhotos(){
  if(!HI.authed()) return;
  const pending=state.meetings.filter(m=>m.photo && !m.hiImageId);
  if(!pending.length) return;
  const total=pending.length; let done=0;
  let el=document.getElementById("photoSyncBar");
  if(!el){ el=document.createElement("div"); el.id="photoSyncBar";
    el.style.cssText="position:fixed;left:12px;right:12px;bottom:84px;z-index:99999;background:#111;color:#fff;"
      +"padding:13px 16px;border-radius:14px;font:600 14px/1.45 system-ui,-apple-system,sans-serif;"
      +"box-shadow:0 8px 28px rgba(0,0,0,.32);text-align:center";
    document.body.appendChild(el); }
  const paint=()=>{ el.textContent = done<total
    ? ("☁️ Uploading your photos to the cloud… "+done+"/"+total+" · keep this page open")
    : ("✓ All "+total+" photos are now in the cloud"); };
  paint();
  const CONC=4; let idx=0;
  async function worker(){ while(idx<pending.length){ const m=pending[idx++];
    try{ await syncMeetingToHi(m); }catch(_){} done++; paint(); } }
  await Promise.all(Array.from({length:Math.min(CONC,pending.length)},()=>worker()));
  setTimeout(()=>{ try{ el.remove(); }catch(_){} }, 3500);
  try{ renderAll(); }catch(_){}
}
/* ========================= pull DOWN: server is the source of truth =========================
   When signed in, the server holds the canonical copy of the user's own photo posts. We list
   the caller's OWN scope (self → all visibilities, private + public) and reconcile:
   - For a local meeting that already carries this oi_xxx: refresh its hiPublic flag from the
     server's visibility_status (so the per-post toggle reflects reality, even cross-device).
   - For a server image with NO local copy (e.g. posted from another device): surface it as a
     read-only remote post so the app and the /met feed show the SAME server data — fixing the
     old split where the app only ever read local IndexedDB.
   Offline / signed-out: skipped, the local diary still renders from IndexedDB. */
function imgDownloadUrl(img){
  const d=img&&(img.download||img.download_url||img.url||{});
  if(typeof d==="string") return /^https?:\/\//i.test(d)?d:"";
  const u=d&&(d.url||d.download_url||d.signed_url||d.href)||"";
  return /^https?:\/\//i.test(u)?u:"";
}
async function pullMyServerPosts(){
  state.remote=[];
  if(!HI.authed()) return;
  let images=[];
  try{
    const r=await HI.call("hi.owner-images",{ action:"list", kinds:["post"], limit:200 });
    images=(r&&(r.images||r.items||r.list))||[];
  }catch(e){ return; /* signed out / transient — keep local view */ }
  const byImageId=new Map(state.meetings.filter(m=>m.hiImageId).map(m=>[m.hiImageId,m]));
  // Reconcile locals first (no network); collect server-only posts.
  const remoteImgs=[];
  for(const img of images){
    const id=img.id||img.image_id; if(!id) continue;
    const local=byImageId.get(id);
    if(local){
      // Server is truth for visibility — reconcile the toggle state.
      const pub=(img.visibility_status||img.visibility||"").toLowerCase()==="public";
      if(!!local.hiPublic!==pub){ local.hiPublic=pub; try{ await saveMeeting(local); }catch(_){} }
      continue;
    }
    remoteImgs.push(img);
  }
  // Server-only posts: fetch presigned URLs in PARALLEL. Was N sequential round-trips
  // (≈N×latency — several seconds at 30+ posts); now one parallel batch.
  await Promise.all(remoteImgs.map(async img=>{
    const id=img.id||img.image_id;
    const vis=(img.visibility_status||img.visibility||"").toLowerCase();
    let url=imgDownloadUrl(img);
    if(!url){ try{ const g=await HI.call("hi.owner-images",{action:"get_download_url",image_id:id}); url=imgDownloadUrl(g)||(typeof g==="string"?g:(g&&(g.url||g.download_url)))||""; }catch(_){} }
    state.remote.push({
      id:"hi:"+id, remote:true, hiImageId:id, hiPublic:vis==="public",
      createdAt:Date.parse(img.created_at||img.createdAt||"")||Date.now(),
      photoUrl:url||"", caption:(img.caption_markdown||img.title||img.alt_text||"").trim(),
      personIds:[]
    });
  }));
  // Attach server tags to the freshly-built remote items (keyed by image_id).
  if(typeof applyMetTags==="function") applyMetTags();
}
// Take an already-public post back to PRIVATE (unpublish). set_visibility=private genuinely
// removes the image from the /met feed. (The reverse — private→public — can't be done with
// set_visibility, because feed_eligible is locked at upload time; see publishMeetingToFeed.)
async function unpublishMeeting(meeting){
  if(!HI.authed() || !meeting || !meeting.hiImageId) return false;
  try{
    await HI.call("hi.owner-images",{ action:"set_visibility", image_id:meeting.hiImageId,
      visibility_status:"private" });
    meeting.hiPublic=false;
    // Only local meetings persist to IndexedDB; remote pseudo-records are session-only (server is truth).
    if(!meeting.remote){ try{ await saveMeeting(meeting); }catch(_){} }   // sync the new public flag to the cloud backend
    return true;
  }catch(e){ toast("Couldn't change visibility"); return false; }
}
// Get the actual photo bytes for a meeting, whichever device it lives on.
//  - Local meeting: the Blob is right there in IndexedDB (meeting.photo).
//  - Synced/remote post with no local blob: ask Hi for a presigned GET URL for the current
//    image and fetch the bytes back. We need real bytes (not just the URL) because the only
//    way to make a post feed-eligible is to RE-UPLOAD it as a fresh feed_eligible image.
async function meetingPhotoBlob(meeting){
  if(meeting && meeting.photo) return meeting.photo;
  if(!HI.authed() || !meeting || !meeting.hiImageId) return null;
  let url="";
  try{
    const g=await HI.call("hi.owner-images",{ action:"get_download_url", image_id:meeting.hiImageId });
    url=imgDownloadUrl(g)||(typeof g==="string"?g:(g&&(g.url||g.download_url)))||"";
  }catch(_){ return null; }
  if(!/^https?:\/\//i.test(url)) return null;
  try{ const r=await fetch(url); if(!r.ok) return null; const b=await r.blob();
    return (b&&b.size)?b:null; }catch(_){ return null; }
}
// Re-upload a meeting's photo as a NEW feed-eligible+public image so it actually lands in the
// public /met feed. (A set_visibility=public on the EXISTING image never enters the feed —
// feed_eligible/request_public_on_approve are write-once at upload time. So "promote to feed"
// genuinely means: upload a fresh copy with those flags, then drop the old image.)
// Returns the new oi_xxx image id, or null. Throws on hard upload failure.
async function reuploadAsPublic(blob){
  const mime=mimeOf(blob);
  let dims={w:0,h:0}; try{ dims=await blobDims(blob); }catch(_){}
  const pre=await HI.call("hi.owner-images",{ action:"presign_upload", kind:"post",
    original_filename:"who-i-met-pub-"+uid()+"."+extFor(mime), mime_type:mime,
    size_bytes:blob.size||undefined, width:dims.w||undefined, height:dims.h||undefined,
    request_public_on_approve:true, feed_eligible:true });
  const img=pre.image||pre, up=pre.upload||{};
  const imageId=img.id||img.image_id; const putUrl=up.url||up.upload_url||up.put_url;
  if(!imageId||!putUrl){ throw new Error("presign_missing_fields"); }
  const headers=Object.assign({"content-type":mime}, up.required_headers||up.headers||{});
  const put=await fetch(putUrl,{ method:"PUT", body:blob, headers });
  if(!put.ok){ throw new Error("s3_put_"+put.status); }
  await HI.call("hi.owner-images",{ action:"finalize_upload", image_id:imageId, reported_size_bytes:blob.size||undefined });
  return imageId;
}
// Promote a private/synced/old post into the public /met feed. The photo is re-uploaded as a
// fresh feed-eligible+public image; on success the meeting points at the NEW image id and the
// OLD image is deleted (best-effort — a leftover orphan is not fatal). Returns true on success.
async function publishMeetingToFeed(meeting){
  if(!HI.authed() || !meeting || !meeting.hiImageId || meeting.hiPublic) return false;
  const blob=await meetingPhotoBlob(meeting);
  if(!blob){ toast("Couldn't load the photo to publish"); return false; }
  const oldId=meeting.hiImageId;
  let newId=null;
  try{ newId=await reuploadAsPublic(blob); }
  catch(e){ toast("Couldn't publish — try again"); return false; }
  if(!newId){ toast("Couldn't publish — try again"); return false; }
  meeting.hiImageId=newId; meeting.hiPublic=true; meeting.hiSyncedAt=Date.now();
  // Persist local meetings; remote pseudo-records are session-only (server is the truth on next pull).
  if(!meeting.remote){ try{ await saveMeeting(meeting); }catch(_){} }   // sync the new image_id + public flag to the cloud backend
  // Drop the old image now that the new feed copy is finalized — avoids leaving an orphan.
  try{ await HI.call("hi.owner-images",{ action:"delete", image_id:oldId }); }catch(_){}
  return true;
}

/* ========================= state / helpers ========================= */
const state={ people:[], meetings:[], remote:[], urls:new Map(), tagsByMeeting:null, tagsByImage:null };
// Local meetings (with blobs) + server-only posts pulled for this signed-in user, newest first.
// Local wins when both exist (it carries the tagged people); remote fills cross-device gaps.
function allMeetings(){ return state.meetings.concat(state.remote||[]).sort((a,b)=>b.createdAt-a.createdAt); }
const uid=()=>(Date.now().toString(36)+Math.random().toString(36).slice(2,8));
const norm=s=>String(s||"").trim().toLowerCase().replace(/\s+/g," ");
const esc=s=>(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const initials=name=>{ const p=String(name||"").trim().split(/\s+/); return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase()||"?"; };
const PCOLORS=[
  {a:"#d18a00",d:"#8a5c00",g:"rgba(209,138,0,.42)",t:"rgba(209,138,0,.15)"},
  {a:"#2467e8",d:"#1b4fb8",g:"rgba(36,103,232,.40)",t:"rgba(36,103,232,.13)"},
  {a:"#34c759",d:"#1d7c3e",g:"rgba(52,199,89,.42)",t:"rgba(52,199,89,.16)"},
  {a:"#7c4dff",d:"#5b32c7",g:"rgba(124,77,255,.40)",t:"rgba(124,77,255,.14)"},
];
const pcolor=seed=>{ let h=0; for(const c of (seed||"?")) h=(h*31+c.charCodeAt(0))>>>0; return PCOLORS[h%4]; };

async function loadAll(){
  state.people=await dbGetAll("people");
  state.meetings=(await dbGetAll("meetings")).sort((a,b)=>b.createdAt-a.createdAt);
  // Build object URLs for local photo Blobs WITHOUT revoking existing ones. Revoking mid-session
  // (this runs again after the sign-in merge) can kill a blob: URL that an in-flight <img> on the
  // People grid is still loading → its onerror fires → it falls back to initials even though the
  // photo is fine. Stable, append-only URLs + lazy creation in photoURL = avatars render reliably.
  for(const m of state.meetings){ if(m.photo && !state.urls.has(m.id)) state.urls.set(m.id,URL.createObjectURL(m.photo)); }
}

/* ========================= MET cloud merge (server is source of truth) =========================
   Pulls /api/met/state and reconciles it into in-memory state + the IndexedDB cache.
   - persons: server wins by id; local-only persons are kept (they get pushed up by migration).
   - meetings: server reconciles caption/hiPublic on matching local meetings (photo Blob kept);
     server-only TEXT meetings (no image_id) are added as local cache rows; server-only PHOTO
     meetings (have image_id) are left for pullMyServerPosts to surface as remote items — de-dup
     is by image_id (a local meeting carrying that hiImageId stops pullMyServerPosts duplicating).
   - tags: meeting_id→[person_id] AND image_id→[person_id] maps are stashed on state, applied by
     applyMetTags() to every meeting (local + server-only + remote owner-image post). This is what
     makes people show up and posts carry their tagged names cross-device.
   Best-effort: any failure leaves the local view intact. */
async function mergeServerState(){
  if(!HI.authed()) return false;
  const data=await MET.state();
  if(!data) return false;
  // -------- persons: server wins by id --------
  const localPeople=new Map(state.people.map(p=>[p.id,p]));
  for(const row of (data.persons||[])){
    const sp=MET.personFromRow(row); if(!sp||!sp.id) continue;
    localPeople.set(sp.id,sp);
    try{ await dbPut("people",sp); }catch(_){}   // refresh cache only — do NOT echo back to server
  }
  state.people=Array.from(localPeople.values());
  // Self-heal: if this device knows people the server doesn't (a migration that never landed), push them
  // up now (+ the local meetings that tag them). Idempotent upsert-by-id; no flag dependency so it
  // corrects the cloud on ANY login instead of relying on the once-per-device migrate.
  try{
    const serverIds=new Set((data.persons||[]).map(r=>{ const sp=MET.personFromRow(r); return sp&&sp.id; }));
    const missing=state.people.filter(p=>p.id&&!serverIds.has(p.id));
    if(missing.length){ const mids=new Set(missing.map(p=>p.id));
      await MET.importAll(missing, state.meetings.filter(m=>(m.personIds||[]).some(id=>mids.has(id)))); }
  }catch(_){}
  // -------- meetings: reconcile locals; add server-only text meetings --------
  // (correlate every server meeting_id → image_id for tag mapping, even when not cached locally)
  const imageOfMeeting=new Map();
  const localMeet=new Map(state.meetings.map(m=>[m.id,m]));
  for(const row of (data.meetings||[])){
    const sm=MET.meetingFromRow(row); if(!sm||!sm.id) continue;
    if(sm.hiImageId) imageOfMeeting.set(sm.id,sm.hiImageId);
    const local=localMeet.get(sm.id);
    if(local){
      // Server is truth for caption/visibility/image_id; keep the local photo Blob + object URL.
      local.caption=sm.caption; local.hiPublic=sm.hiPublic;
      if(sm.hiImageId) local.hiImageId=sm.hiImageId;
      try{ await dbPut("meetings",local); }catch(_){}
    } else if(!sm.hiImageId){
      // Server-only TEXT meeting (no photo): cache it locally so it renders everywhere.
      localMeet.set(sm.id,sm);
      try{ await dbPut("meetings",sm); }catch(_){}
    }
    // Server-only PHOTO meeting (has image_id, no local copy): intentionally NOT cached into
    // state.meetings — it's surfaced by pullMyServerPosts as a remote item (which fetches the
    // presigned photo URL). Tags reach it via the image_id map below.
  }
  state.meetings=Array.from(localMeet.values()).sort((a,b)=>b.createdAt-a.createdAt);
  // rebuild object URLs for any newly-cached meetings that happen to carry a Blob
  // Build object URLs for local photo Blobs WITHOUT revoking existing ones. Revoking mid-session
  // (this runs again after the sign-in merge) can kill a blob: URL that an in-flight <img> on the

  for(const m of state.meetings){ if(m.photo && !state.urls.has(m.id)) state.urls.set(m.id,URL.createObjectURL(m.photo)); }

  const byMeeting=new Map(), byImage=new Map();
  for(const t of (data.tags||[])){
    if(!t||!t.meeting_id||!t.person_id) continue;
    if(!byMeeting.has(t.meeting_id)) byMeeting.set(t.meeting_id,[]);
    byMeeting.get(t.meeting_id).push(t.person_id);
    const img=imageOfMeeting.get(t.meeting_id);
    if(img){ if(!byImage.has(img)) byImage.set(img,[]); byImage.get(img).push(t.person_id); }

function applyMetTags(){

  // "known" people — a tag for a not-yet-synced person must survive (personById guards undefined downstream).
  for(const m of state.meetings){
    const t=byMeeting&&byMeeting.get(m.id);

  }

/* ========================= live name search (on-device + Hi DB) ========================= */
/* Performance: instant on-device matches render first; the Hi full-DB search is
   debounced (220ms), stale responses are dropped (seq), and every query is cached.
   Only fires when signed in and q>=2. Falls back to adding the raw string on Enter. */
const _nameSearch={ seq:0, t:null, cache:new Map(), results:[], q:"", byName:new Map() };
function liveNameSearch(q, cb){
  q=(q||"").trim(); const key=norm(q);
  if(!HI.authed()||key.length<2){ _nameSearch.q=q; _nameSearch.results=[]; cb&&cb(); return; }
  if(_nameSearch.cache.has(key)){ _nameSearch.q=q; _nameSearch.results=_nameSearch.cache.get(key); cb&&cb(); return; }
  const seq=++_nameSearch.seq; clearTimeout(_nameSearch.t);
  _nameSearch.t=setTimeout(async()=>{
    try{
      const r=await HI.call("hi.owners",{action:"search",q,typeahead:true,limit:8});
      const people=(r.people||[]).filter(p=>p&&p.display_name).map(p=>({
        display_name:p.display_name, headline:p.headline||"",
        customer_id:p.owner_customer_id||p.customer_id||null, owner_public_url:p.owner_public_url||null, avatar_url:p.avatar_url||null }));
      _nameSearch.cache.set(key,people);
      if(seq===_nameSearch.seq){ _nameSearch.q=q; _nameSearch.results=people; cb&&cb(); }
    }catch(_){ if(seq===_nameSearch.seq){ _nameSearch.q=q; _nameSearch.results=[]; cb&&cb(); } }
  },220);
}
// Render suggestion chips into suggestEl: on-device matches (extraNames + diary), then Hi DB matches.
function buildNameSuggest(suggestEl, q, addFn, extraNames){
  if(!suggestEl) return;

  const recent=state.people.slice().sort((a,b)=>meetCount(b.id)-meetCount(a.id)).map(p=>p.name);
  let pool=[...(extraNames||[]), ...recent]; const seen=new Set();
  pool=pool.filter(n=>{ const k=norm(n); if(!k||seen.has(k)||added.has(k)) return false; seen.add(k); return true; });
  if(qn) pool=pool.filter(n=>norm(n).includes(qn));
  const local=pool.slice(0,6); const localSet=new Set(local.map(norm));
  const hi=(HI.authed()&&qn.length>=2&&norm(_nameSearch.q)===qn)?_nameSearch.results:[];
  const hiList=hi.filter(p=>p.display_name&&!added.has(norm(p.display_name))&&!localSet.has(norm(p.display_name))).slice(0,6);
  hiList.forEach(p=>_nameSearch.byName.set(norm(p.display_name),p));
  const loading=HI.authed()&&qn.length>=2&&norm(_nameSearch.q)!==qn;
  suggestEl.innerHTML=
    local.map(n=>`<button class="s" data-add="${esc(n)}">+ ${esc(n)}</button>`).join("")
    + hiList.map(p=>`<button class="s hi" data-add="${esc(p.display_name)}" title="${esc(p.headline||'on HiRey')}">${esc(p.display_name)}<span class="s-tag">HiRey</span></button>`).join("")
    + (loading?`<span class="s-load">searching HiRey…</span>`:"");

function wireNameInput(queryEl, suggestEl, addFn, extraFn){

  const ms=allMeetings().filter(m=>(m.personIds||[]).includes(p.id));
  const hi=p.hiOwner||{}, title=(p.title||hi.headline||"").trim();
  const parts=p.name.trim().split(/\s+/), given=parts[0]||p.name, family=parts.length>1?parts.slice(1).join(" "):"";
  const note=[]; if(ms[0]){ note.push("Met "+relDay(ms[0].createdAt)+(ms[0].caption?" — "+ms[0].caption:"")); }
  if(p.introBy) note.push("Intro’d by "+p.introBy);
  if(p.note) note.push(p.note);
  note.push("Saved from Who I Met · HiRey");
  const L=["BEGIN:VCARD","VERSION:3.0","N:"+vcEscape(family)+";"+vcEscape(given)+";;;","FN:"+vcEscape(p.name)];
  if(title) L.push("TITLE:"+vcEscape(title));
  if(p.phone) L.push("TEL;TYPE=CELL:"+vcEscape(p.phone));
  if(p.email) L.push("EMAIL;TYPE=INTERNET:"+vcEscape(p.email));
  if(hi.owner_public_url) L.push("URL:"+vcEscape(hi.owner_public_url));
  L.push("NOTE:"+vcEscape(note.join("\n")));
  const photoM=ms.find(m=>m.photo);
  if(photoM&&photoM.photo){ try{ const b64=await blobToB64(await downscale(photoM.photo,500,.8));
    if(b64) L.push(foldVC("PHOTO;ENCODING=b;TYPE=JPEG:"+b64)); }catch(_){} }
  L.push("END:VCARD"); return L.join("\r\n");
}
async function saveContact(p){
  let vc; try{ vc=await makeVCard(p); }catch(_){ toast("Couldn’t build the contact"); return; }
  // data: URI → one tap opens iOS "Create New Contact" directly (desktop/Android download the .vcf).
  const a=document.createElement("a"); a.href="data:text/vcard;charset=utf-8,"+encodeURIComponent(vc);
  a.download=(p.name.split(" ")[0]||"contact")+".vcf"; document.body.appendChild(a); a.click(); a.remove();
  toast("Adding "+p.name.split(" ")[0]+" to your contacts…");
}

/* ========================= rendering ========================= */
function relDay(ts){ const d=new Date(ts), now=new Date(); const dk=x=>new Date(x).setHours(0,0,0,0);
  const diff=Math.round((dk(now)-dk(d))/86400000);
  if(diff===0) return "today"; if(diff===1) return "yesterday";
  if(diff<7) return d.toLocaleDateString(undefined,{weekday:"long"});
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function timeStr(ts){ return new Date(ts).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); }
function dayKey(ts){ return new Date(ts).toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"}); }

function meetingCardHTML(m,i=0){
  const isRemote=!!m.remote;   // server-only post pulled for this user (no local blob on this device)
  const ppl=(m.personIds||[]).map(id=>personById(id)).filter(Boolean);
  // Remote posts carry no tagged people on this device — show a quiet "from your account" label
  // instead of an "+ add a name" affordance (you can't retag a post whose blob isn't on this device).
  const chips=ppl.length?ppl.map(p=>`<span class="chip" data-pid="${p.id}"><span class="pd" style="background:${pcolor(p.name).a}"></span>${esc(p.name)}</span>`).join("")
    :(isRemote?`<span class="chip" style="color:var(--ink-faint);font-style:italic">From your HiRey account</span>`
              :`<span class="chip add">+ add a name</span>`);
  // Visibility pill: shown once the photo is on Hi (has an oi_xxx) — works for both local-synced
  // and remote posts. Both states are now tappable toggles:
  //   PUBLIC  → tap takes it back to private (set_visibility=private; genuinely leaves the feed).
  //   PRIVATE → tap publishes it to the public feed (re-uploads as a fresh feed-eligible image,
  //             after a consent confirm — see publishMeetingToFeed). It can really go public now.
  const LOCK=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>`;
  const GLOBE=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>`;
  const visBtn=(HI.authed()&&m.hiImageId)
    ? (m.hiPublic
        ? `<button class="card-vis pub" data-mid="${m.id}" data-act="private" title="Public — on the /met feed. Tap to make private (removes it from the feed).">${GLOBE}Public</button>`
        : `<button class="card-vis priv" data-mid="${m.id}" data-act="public" title="Private — only you. Tap to post it to the public /met feed.">${LOCK}Private</button>`)
    : "";
  const photo=photoURL(m);
  return `<div class="card" data-mid="${m.id}" style="animation-delay:${i*45}ms">
    ${photo?`<img class="ph" src="${esc(photo)}" loading="lazy">`:""}
    <div class="body"><div class="who">${chips}</div>
    ${m.caption?`<div class="cap">${esc(m.caption)}</div>`:""}
    <div class="meta-row"><span class="meta">${timeStr(m.createdAt)}</span><span style="display:inline-flex;gap:8px;align-items:center">${visBtn}${(!isRemote&&ppl.length)?`<button class="card-share" data-mid="${m.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>Send card</button>`:""}</span></div></div></div>`;
}
// Find a card by id across both local meetings and pulled remote posts.
function findCard(mid){ return state.meetings.find(x=>x.id===mid)||(state.remote||[]).find(x=>x.id===mid); }
function wireCards(root){
  root.querySelectorAll(".chip[data-pid]").forEach(c=>c.onclick=()=>openPerson(c.dataset.pid));
  root.querySelectorAll(".chip.add").forEach(c=>c.onclick=()=>retag(c.closest(".card").dataset.mid));
  root.querySelectorAll(".card-share").forEach(b=>b.onclick=e=>{ e.stopPropagation(); shareFromCard(b.dataset.mid); });
  // Both pills are now toggles: data-act="public" → publish to feed, "private" → unpublish.
  root.querySelectorAll("button.card-vis").forEach(b=>b.onclick=e=>{ e.stopPropagation();
    if(b.dataset.act==="public") makeMeetingPublic(b.dataset.mid, b);
    else makeMeetingPrivate(b.dataset.mid); });
}
// Tap on a Public pill → take it private again (remove from the /met feed).
async function makeMeetingPrivate(mid){
  const m=findCard(mid); if(!m||!m.hiImageId||!m.hiPublic) return;
  if(!confirm("Make this private?\n\nIt will be removed from the public /met feed and visible only to you.")) return;
  const ok=await unpublishMeeting(m);
  if(ok){ renderAll(); toast("Back to private — only you"); }
}
// Tap on a Private pill → publish to the public /met feed. Public is an explicit, consented
// action: every photo is a real person who must agree to be shown publicly. We confirm consent,
// then re-upload the photo as a fresh feed-eligible image (the only way a post can enter the feed).
async function makeMeetingPublic(mid, btnEl){
  if(!HI.authed()){ toast("Sign in to post to the public feed"); openAccount(); return; }
  const m=findCard(mid); if(!m||!m.hiImageId||m.hiPublic) return;
  if(!confirm("Post this to the public /met feed?\n\nEveryone will be able to see it. Only post with the consent of everyone pictured — each photo is a real person.")) return;
  // In-progress state on the pill itself; restore on failure.
  let restore="";
  if(btnEl){ restore=btnEl.innerHTML; btnEl.disabled=true; btnEl.textContent="Publishing…"; }
  let ok=false;
  try{ ok=await publishMeetingToFeed(m); }catch(_){ ok=false; }
  if(ok){ renderAll(); toast("Posted — it’s on the public feed once review clears"); }
  else if(btnEl){ btnEl.disabled=false; btnEl.innerHTML=restore; }   // rollback the pill UI
}
function shareFromCard(mid){ const m=state.meetings.find(x=>x.id===mid); if(!m||!m.personIds.length) return;
  showSheet("sheet2","scrim2");
  presentCard(m.personIds[0], {sheet:"sheet2",scrim:"scrim2",backLabel:"Done",onBack:()=>hideSheet("sheet2","scrim2")}); }
function retag(mid){ const m=state.meetings.find(x=>x.id===mid); if(!m) return;
  // Retag only edits names/note — visibility was already decided at the original save, so
  // the public/private picker is suppressed here (pending.retag).
  pending={ blob:m.photo, url:m.photo?URL.createObjectURL(m.photo):"", names:[], makePublic:false, retag:true };
  renderCaptureSheet(); showSheet("sheet","scrim");
  document.getElementById("capSave").onclick=async()=>{
    const stray=document.getElementById("nameInput").value.trim(); if(stray) addName(stray);
    const ids=[...m.personIds]; for(const n of pending.names){ const id=await resolvePerson(n); if(id&&!ids.includes(id)) ids.push(id); }
    m.personIds=ids; const note=document.getElementById("capNote").value.trim(); if(note) m.caption=note;
    await saveMeeting(m); closeCaptureSheet(); await loadAll(); renderAll(); toast("Tags updated"); }; }

const SR=window.SpeechRecognition||window.webkitSpeechRecognition; let rec=null, listening=false;
const VSTOP=new Set("i im met meet saw seen see today yesterday tomorrow morning afternoon evening tonight night at we the a an and or but with to of in on for from he she they them my his her their your our it its this that these those then so also too just had has have having got get gonna was were is are be been new old some nice great good cool awesome guy girl dude folks people founder cofounder ceo cto coo cfo vp head lead vc angel investor partner engineer designer pm coffee lunch dinner drinks brunch breakfast meeting call event party afterparty mixer demo day talk talked talking spoke speaking chat chatting chatted ran run running into about over here there really very super".split(" "));
function detectNames(text){ const out=[], seen=new Set(pending.names.map(norm)); const low=" "+text.toLowerCase().replace(/[^\w\s'’]/g," ")+" ";
  for(const p of state.people){ if(p.nameLower&&low.includes(" "+p.nameLower+" ")&&!seen.has(p.nameLower)){ out.push(p.name); seen.add(p.nameLower);} }
  const re=/\b([A-Z][a-zA-Z'’]+(?:\s+[A-Z][a-zA-Z'’]+){0,2})\b/g; let m;
  while((m=re.exec(text))){ const parts=m[1].trim().split(/\s+/).filter(w=>!VSTOP.has(w.toLowerCase()));
    if(!parts.length) continue; const name=parts.join(" "); if(name.length<2||seen.has(norm(name))) continue; out.push(name); seen.add(norm(name)); }
  return out.slice(0,8); }
function openVoiceSheet(){ pending={ blob:null, url:"", names:[] }; renderVoiceSheet(); showSheet("sheet","scrim"); setTimeout(()=>document.getElementById("voiceText")?.focus(),320); }
function renderVoiceSheet(){
  document.getElementById("sheet").innerHTML=`
    <div class="grip"></div>
    <h2>Who did you meet?</h2>
    <div class="mic-row">
      ${SR?`<button class="mic-btn" id="micBtn" aria-label="Speak"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>`:""}
      <div class="mic-hint" id="micHint">${SR?"Tap the mic and just say it &mdash; or type below.":"Type who you met below."}</div>
    </div>
    <textarea id="voiceText" placeholder="Met Maya Chen at Ritual — she's raising a seed round. Ran into Dev Patel too." style="min-height:92px"></textarea>
    <div class="field-label" style="margin-top:18px">People</div>
    <input type="text" id="nameInput" placeholder="${HI.authed()?"Add a name — search HiRey, or Enter":"Add a name, then Enter"}" autocomplete="off" autocapitalize="words">
    <div class="added" id="added"></div>
    <div class="suggest" id="voiceSuggest"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="capSaveOnly">Just save</button>

  document.getElementById("voiceText").addEventListener("input",renderVChips);
  const input=document.getElementById("nameInput");
  input.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); addNameV(input.value); input.value=""; }});
  input.addEventListener("input",()=>{ refreshVoiceSuggest(); liveNameSearch(input.value, refreshVoiceSuggest); });
  if(SR) document.getElementById("micBtn").onclick=toggleRec;
  document.getElementById("capSaveOnly").onclick=()=>saveVoiceMoment(false);
  document.getElementById("capSave").onclick=()=>saveVoiceMoment(true);
