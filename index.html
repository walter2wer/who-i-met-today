function renderVChips(){ const added=document.getElementById("added"); if(!added) return;
  added.innerHTML=pending.names.map(n=>{ const c=pcolor(n);
    return `<span class="tag" data-n="${esc(n)}" style="background:${c.t};color:${c.d}">${esc(n)} <span class="x">&times;</span></span>`; }).join("");
  added.querySelectorAll(".tag").forEach(c=>c.onclick=()=>{ pending.names=pending.names.filter(n=>n!==c.dataset.n); renderVChips(); });
  refreshVoiceSuggest();
}
function refreshVoiceSuggest(){
  const q=document.getElementById("nameInput")?.value||"";
  const det=detectNames(document.getElementById("voiceText")?.value||"");
  buildNameSuggest(document.getElementById("voiceSuggest"), q, addNameV, det);
}
function addNameV(v, hi){ const n=(v||"").trim(); if(!n) return; if(!pending.names.some(x=>norm(x)===norm(n))) pending.names.push(n);
  if(hi){ (pending.hi||(pending.hi={}))[norm(n)]=hi; }
  const q=document.getElementById("nameInput"); if(q) q.value="";
  renderVChips(); if(q) q.focus(); }
function toggleRec(){ listening?stopRec():startRec(); }
function startRec(){ if(!SR) return; try{ rec=new SR(); }catch(e){ toast("Voice not available here"); return; }
  rec.lang=navigator.language||"en-US"; rec.interimResults=true; rec.continuous=true;
  const ta=document.getElementById("voiceText"); const base=ta.value.trim();
  rec.onresult=e=>{ let t=""; for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript; ta.value=(base?base+" ":"")+t; renderVChips(); };
  rec.onerror=()=>stopRec(); rec.onend=()=>{ listening=false; micUI(); };
  try{ rec.start(); listening=true; micUI(); }catch(e){} }
function stopRec(){ try{ if(rec) rec.stop(); }catch(e){} listening=false; micUI(); }
function micUI(){ const b=document.getElementById("micBtn"), h=document.getElementById("micHint");
  if(b) b.classList.toggle("live",listening); if(h) h.innerHTML=listening?"Listening… tap to stop.":(SR?"Tap the mic and just say it &mdash; or type below.":"Type who you met below."); }
function closeVoiceSheet(){ stopRec(); hideSheet("sheet","scrim"); pending={blob:null,url:"",names:[]}; }
async function saveVoiceMoment(shareAfter){
  const note=document.getElementById("voiceText").value.trim();
  const stray=document.getElementById("nameInput").value.trim(); if(stray) addNameV(stray);
  if(!pending.names.length&&!note){ toast("Say or type something first"); return; }
  const ids=[]; for(const n of pending.names){ const id=await resolvePerson(n); if(id) ids.push(id); }
  await applyPendingHiLinks();
  await saveMeeting({ id:uid(), createdAt:Date.now(), photo:null, caption:note, personIds:ids });
  stopRec(); pending={blob:null,url:"",names:[]};
  await loadAll(); renderAll(); switchView("today");
  if(shareAfter && ids.length){ await presentCard(ids[0], {sheet:"sheet",scrim:"scrim",backLabel:"Done",onBack:()=>hideSheet("sheet","scrim")}); }
  else { hideSheet("sheet","scrim"); toast(ids.length?`Saved — met ${ids.map(i=>personById(i).name).join(", ")}`:"Moment saved"); } }

/* ========================= invite / claim ========================= */
const CLAIM_BASE="https://hirey.ai/met/claim";
function getMyName(){ return (HI.myName()||localStorage.getItem("wim_my_name")||"").trim()||"A friend"; }
function myLinktree(){ return (HI.profile&&HI.profile.owner_public_url)||((HI.session()||{}).owner_public_url)||""; }
function myAvatar(){ var a=(HI.profile&&(HI.profile.avatar||HI.profile.avatar_url||HI.profile.avatar_thumb_url))||"";
  if(!a) a=(localStorage.getItem("wim_my_avatar")||"").trim();   // not-on-Hi / no-Hi-avatar fallback so the sender's face still rides the share
  return /^https?:\/\//i.test(a)?a:""; }
/* Build the claim/we-met link carrying the SENDER's identity inline — so the
   person you met can see who you are at a glance (face, headline, links) even
   when they re-open the link days later, without clicking through to LinkedIn. */
function claimURL(p){ const E=encodeURIComponent, pr=HI.profile||{};
  const on=new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"});
  const myUrl=myLinktree(), myPic=myAvatar();
  let u=CLAIM_BASE+"?from="+E(getMyName())+"&name="+E(p.name)+"&on="+E(on);
  if(myUrl) u+="&me="+E(myUrl);
  if(myPic) u+="&pic="+E(myPic);
  if(pr.headline) u+="&hl="+E(pr.headline);
  if(pr.twitter_handle) u+="&tw="+E(pr.twitter_handle);
  if(pr.website_url) u+="&web="+E(pr.website_url);
  if(pr.linkedin_url) u+="&li="+E(pr.linkedin_url);
  if(pr.bio_markdown) u+="&bio="+E(pr.bio_markdown.replace(/[#*_`>\[\]()]/g," ").replace(/\s+/g," ").trim().slice(0,140));
  const wo=getWorkingOn(); if(wo) u+="&wo="+E(wo.slice(0,120));
  const lf=getLookingFor(); if(lf) u+="&lf="+E(lf.slice(0,120));
  return u; }
/* My own shareable contact — the phone/email I'm willing to hand the people I meet.
   PRIVATE by design: lives in localStorage, NEVER goes on the public claim page;
   it only rides the direct (iMessage) we-met-card send, to the one person I chose. */
function getMyPhone(){ return (localStorage.getItem("wim_my_phone")||"").trim(); }
function getMyEmail(){ return (localStorage.getItem("wim_my_email")||"").trim(); }
function hasMyContact(){ return !!(getMyPhone()||getMyEmail()); }
function makeMyVCard(){ const pr=HI.profile||{}, nm=getMyName(), parts=nm.trim().split(/\s+/);
  const L=["BEGIN:VCARD","VERSION:3.0","N:"+vcEscape(parts.length>1?parts.slice(1).join(" "):"")+";"+vcEscape(parts[0]||nm)+";;;","FN:"+vcEscape(nm)];
  if(pr.headline) L.push("TITLE:"+vcEscape(pr.headline));
  const ph=getMyPhone(), em=getMyEmail();
  if(ph) L.push("TEL;TYPE=CELL:"+vcEscape(ph));
  if(em) L.push("EMAIL;TYPE=INTERNET:"+vcEscape(em));
  if(pr.twitter_handle) L.push("X-SOCIALPROFILE;TYPE=twitter:https://x.com/"+pr.twitter_handle.replace(/^@+/,""));
  const myUrl=myLinktree(); if(myUrl) L.push("URL:"+vcEscape(myUrl));
  if(pr.website_url) L.push("URL:"+vcEscape(pr.website_url));
  if(pr.linkedin_url) L.push("URL:"+vcEscape(pr.linkedin_url));
  const av=myAvatar(); if(/^https?:\/\//.test(av)) L.push("PHOTO;VALUE=URI:"+av.replace(/[\s"'<>]/g,""));
  L.push("NOTE:"+vcEscape("We met — via Who I Met · HiRey"),"END:VCARD"); return L.join("\r\n"); }
function makeMyVCardFile(){ return new File([makeMyVCard()],(getMyName().split(" ")[0]||"me")+".vcf",{type:"text/vcard"}); }
/* Public "at a glance" substance — what you're working on / looking for. Renders inline on the
   shared page so the person you met can judge "should I connect" WITHOUT opening LinkedIn. */
function getWorkingOn(){ return (localStorage.getItem("wim_working_on")||"").trim() || ((HI.profile&&HI.profile.headline)||"").trim(); }
function getLookingFor(){ return (localStorage.getItem("wim_looking_for")||"").trim(); }
/* Share MY card — a standalone, no-counterpart broadcast of my own profile. For
   "someone has my number days later and asks who I am": fire off a link that opens
   my LIVE HiRey card (claim page intro mode, direct-reads /owner/{id}) + lets them
   save me to contacts. No photo-of-them, no we-met capture, no app on their side. */
function myCardURL(){ const E=encodeURIComponent, pr=HI.profile||{};
  const myUrl=myLinktree(), myPic=myAvatar();
  let u=CLAIM_BASE+"?intro=1&from="+E(getMyName());
  if(myUrl) u+="&me="+E(myUrl);
  if(myPic) u+="&pic="+E(myPic);
  if(pr.headline) u+="&hl="+E(pr.headline);
  if(pr.twitter_handle) u+="&tw="+E(pr.twitter_handle);
  if(pr.website_url) u+="&web="+E(pr.website_url);
  if(pr.linkedin_url) u+="&li="+E(pr.linkedin_url);
  const wo=getWorkingOn(); if(wo) u+="&wo="+E(wo.slice(0,120));
  const lf=getLookingFor(); if(lf) u+="&lf="+E(lf.slice(0,120));
  if(pr.bio_markdown) u+="&bio="+E(pr.bio_markdown.replace(/[#*_`>\[\]()]/g," ").replace(/\s+/g," ").trim().slice(0,140));
  return u; }
async function shareMyCard(){
  if(!HI.authed() && !localStorage.getItem("wim_my_name")){ toast("Sign in (or set your name) first — then share your card"); return; }
  // Phone/email aren't in the public Hi profile (the number is only an auth anchor), and by design they
  // never go on the public card link — they ride the vCard attached to this direct share. Make sure there is one.
  if(!hasMyContact()){ toast("Add your phone or email so people can reach you — then share"); myContactEditor(); return; }
  const me=getMyName(), url=myCardURL(), text="Hi — I'm "+me+". Here's my card 👇  "+url;
  let files=[]; try{ files=[makeMyVCardFile()]; }catch(_){ files=[]; }
  try{
    if(files.length && navigator.canShare && navigator.canShare({files})){ await navigator.share({files,text,title:me}); return; }
    if(navigator.share){ await navigator.share({text,title:me}); return; }
  }catch(e){ if(e&&e.name==="AbortError") return; }
  try{ await navigator.clipboard.writeText(text); toast("Card link copied — paste it to them"); }catch(_){ prompt("Copy your card link:", url); }
}

/* ===== Export / Import — move a diary between origins/devices (the only way across browser
   storage, which is per-origin). Photos stay in owner-images (Blobs aren't exported); this
   carries people, tags, notes, and meeting metadata. Import upserts local + bulk-pushes to cloud. */
function exportData(){
  const meetings=state.meetings.map(m=>{ const o={...m}; delete o.photo; return o; });   // drop Blobs (not JSON-able)
  const payload={ v:1, app:"who-i-met", exported_at:Date.now(), people:state.people, meetings };
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(payload)],{type:"application/json"}));
  a.download="who-i-met-export.json"; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },200);
  toast(`Exported ${state.people.length} people + ${meetings.length} moments`);
}
function pickImport(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ if(inp.files&&inp.files[0]) importData(inp.files[0]); }; inp.click();
}
async function importData(file){
  let data; try{ data=JSON.parse(await file.text()); }catch(_){ toast("Couldn't read that file"); return; }
  const ppl=(data&&data.people)||[], mts=(data&&data.meetings)||[];
  if(!ppl.length && !mts.length){ toast("Nothing to import in that file"); return; }
  toast(`Importing ${ppl.length} people…`);
  for(const p of ppl){ if(p&&p.id){ delete p.photo; try{ await dbPut("people",p); }catch(_){} } }
  for(const m of mts){ if(m&&m.id){ delete m.photo; try{ await dbPut("meetings",m); }catch(_){} } }
  await loadAll();
  if(HI.authed()){ try{ await MET.importAll(state.people, state.meetings); }catch(_){} try{ await mergeServerState(); }catch(_){} }
  renderAll();
  toast(`Imported ${ppl.length} people, ${mts.length} moments`+(HI.authed()?" — synced to cloud":" — sign in to sync"));
}

/* ===== "Text us to turn on alerts" — non-blocking nudge for phone-less users =====
   Google/email-only users have no phone, so they get NO push when someone replies (email
   alerts are easy to miss). workspace_overview.phone_for_notify.should_offer flags exactly
   that case. The PRIMARY bind path is "text us": tap → Messages opens prefilled with a one-time
   HI-xxxx nonce → user hits send → hi-secretary relays it to hi-platform which binds the phone
   (no OTP). iMessage (blue) is preferred on Apple; SMS otherwise. Never blocks messaging. */
async function maybeOfferTextBind(){
  try{
    if(!HI.authed()) return;

    if(!pf||!pf.should_offer) return;                             // has a phone / unbound / feature off

  }catch(_){}
}

async function startTextBind(){
  const hint=document.getElementById("tbHint");
  let d; try{ d=await HI.post("/v1/text-bind/start",{},true); }catch(e){ toast("Couldn't start — try again"); return; }
  if(!d||d.error||!d.links){ toast("Couldn't start — try again"); return; }
  const ua=navigator.userAgent||"";
  const isIOS=/iPhone|iPad|iPod/i.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  const isAndroid=/Android/i.test(ua);
  const L=d.links;
  // iMessage 优先(Apple),否则按平台选 sms 链接。
  const link=isIOS?(L.imessage||L.sms_ios):isAndroid?L.sms_android:(L.imessage||L.sms_ios);
  if((isIOS||isAndroid)&&link){
    if(hint){ hint.style.display="block"; hint.textContent="Messages will open with the text ready — just hit send. Alerts turn on automatically."; }
    location.href=link;                                            // 拉起 Messages,正文已预填,用户只按发送
    return;
  }
  // 桌面:打不开 Messages → 给号码 + 预填正文让用户在手机上发(iMessage 号优先展示)。
  const num=d.imessage_number||d.sms_number||"";
  if(hint){ hint.style.display="block";
    hint.innerHTML=`On your phone, text <b>${esc(d.body||"")}</b> to <b>${esc(num)}</b> — alerts turn on the moment it arrives.`; }
}

async function hiSaveProfile(){
  const name=document.getElementById("hpName").value.trim();
  const headline=document.getElementById("hpHead").value.trim();
  const bio=document.getElementById("hpBio").value.trim();
  const x=document.getElementById("hpX").value.trim().replace(/^@+/,"");
  const norm=u=>{ u=(u||"").trim(); return u?(/^https?:\/\//i.test(u)?u:"https://"+u):""; };
  const site=norm(document.getElementById("hpSite").value);
  const li=norm(document.getElementById("hpLi").value);
  // Photo rides the share as ?pic= (sender's face on the claim card). Local-only: a hosted image URL,
  // never an uploaded blob (would bloat the link). A real Hi avatar_url still wins in myAvatar().
  localStorage.setItem("wim_my_avatar",norm(document.getElementById("hpPic").value));
  // "At a glance" rides the share link. Working on auto-fills from the headline — only persist a CUSTOM value
  // (≠ headline) so it never goes stale when the headline changes; Looking for is purely optional.
  const _woH=(document.getElementById("hpHead").value||"").trim(), _woV=(document.getElementById("hpWork").value||"").trim();
  localStorage.setItem("wim_working_on",(_woV&&_woV!==_woH)?_woV:"");
  localStorage.setItem("wim_looking_for",(document.getElementById("hpLook").value||"").trim());
  if(!name){ toast("Add your name"); return; }
  const btn=document.getElementById("hpSave"); btn.textContent="Saving…"; btn.disabled=true;
  try{

    if(site) payload.website_url=site; if(li) payload.linkedin_url=li;
    const r=await HI.call("hi.owners",payload);
    HI.profile=r.owner_profile||Object.assign({},HI.profile,{display_name:name,headline,bio_markdown:bio,twitter_handle:x,website_url:site,linkedin_url:li});
    const s=HI.session()||{}; s.display_name=name; HI.save(s);
    renderAll(); updateMe(); renderAccount(); toast("Profile saved");
  }catch(e){ btn.textContent="Save"; btn.disabled=false; toast(e.status===401?"Session expired — sign in again":"Could not save profile"); }
}

async function hiInvite(pid){

async function invitePerson(pid){ const p=personById(pid); if(!p) return;
  const first=p.name.split(" ")[0];
  const url=claimURL(p);
  const msg=first+", I met you today — claim your HiRey profile: "+url;
  const m=state.meetings.find(x=>x.personIds.includes(pid)&&x.photo);
  let sent=false;
  try{
    if(m&&m.photo&&navigator.canShare){ const file=new File([m.photo],"who-i-met.jpg",{type:m.photo.type||"image/jpeg"});
      if(navigator.canShare({files:[file]})){ await navigator.share({files:[file],text:msg,title:"HiRey"}); sent=true; } }
    if(!sent&&navigator.share){ await navigator.share({text:msg,url}); sent=true; }
  }catch(e){ if(e&&e.name==="AbortError") return; }
  if(!sent){ try{ await navigator.clipboard.writeText(msg); toast("Invite copied — paste it to "+first); }catch(_){ prompt("Copy this invite:",msg); } }
  if(!p.invited){ p.invited=true; await savePerson(p); renderPerson(pid); renderAll(); }
  if(sent) toast("Invite ready for "+first);
}

function loadImg(blob){ return new Promise((res,rej)=>{ const i=new Image(); const t=setTimeout(()=>rej(new Error("img_timeout")),4000); i.decoding="async"; i.onload=()=>{ clearTimeout(t); res(i); }; i.onerror=()=>{ clearTimeout(t); rej(new Error("img_error")); }; i.src=URL.createObjectURL(blob); }); }
async function makeCardBlob(meName, theirName, photoBlob, dateTs, accent){
  const W=1080, PH=980, BH=360, H=PH+BH, pad=64;
  const c=document.createElement("canvas"); c.width=W; c.height=H; const x=c.getContext("2d");
  x.fillStyle="#fbfaf7"; x.fillRect(0,0,W,H);
  if(photoBlob){ try{ const img=await loadImg(photoBlob); const s=Math.max(W/img.width,PH/img.height), dw=img.width*s, dh=img.height*s;
    x.drawImage(img,(W-dw)/2,(PH-dh)/2,dw,dh); }catch(_){ x.fillStyle="#efe9dd"; x.fillRect(0,0,W,PH); x.fillStyle=accent||"#8a5c00"; x.font="600 240px 'Iowan Old Style',Palatino,Georgia,serif"; x.textAlign="center"; x.textBaseline="middle"; x.fillText(initials(theirName),W/2,PH/2); x.textAlign="left"; x.textBaseline="alphabetic"; } }
  else { x.fillStyle="#efe9dd"; x.fillRect(0,0,W,PH); x.fillStyle=accent||"#8a5c00";
    x.font="600 240px 'Iowan Old Style',Palatino,Georgia,serif"; x.textAlign="center"; x.textBaseline="middle";
    x.fillText(initials(theirName),W/2,PH/2); x.textAlign="left"; x.textBaseline="alphabetic"; }
  x.fillStyle="#fbfaf7"; x.fillRect(0,PH,W,BH);
  x.fillStyle=accent||"#34c759"; x.beginPath(); x.arc(pad+7,PH+72,9,0,Math.PI*2); x.fill();
  try{x.letterSpacing="5px";}catch(_){}
  x.fillStyle="rgba(22,20,18,.5)"; x.font="600 28px -apple-system,Inter,Helvetica,Arial,sans-serif"; x.fillText("WE MET", pad+30, PH+82);
  try{x.letterSpacing="0px";}catch(_){}
  const names=meName+"   ×   "+theirName; x.fillStyle="#161412"; let fs=74; x.font="600 "+fs+"px 'Iowan Old Style',Palatino,Georgia,serif";
  while(x.measureText(names).width>W-2*pad&&fs>32){ fs-=2; x.font="600 "+fs+"px 'Iowan Old Style',Palatino,Georgia,serif"; }
  x.fillText(names, pad, PH+178);
  x.fillStyle="rgba(22,20,18,.5)"; x.font="400 30px -apple-system,Inter,Helvetica,Arial,sans-serif";
  x.fillText(new Date(dateTs||Date.now()).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"}), pad, PH+228);
  x.textAlign="right"; x.fillStyle="#161412"; x.font="italic 600 32px 'Iowan Old Style',Palatino,Georgia,serif"; x.fillText("HiRey", W-pad, PH+292);
  x.fillStyle="rgba(22,20,18,.4)"; x.font="400 22px -apple-system,sans-serif"; x.fillText("hirey.ai", W-pad, PH+326);
  x.textAlign="left";
  return new Promise(res=>c.toBlob(res,"image/jpeg",.92));
}
async function shareCard(cardBlob, p, includeContact){ const first=p.name.split(" ")[0];
  const url=claimURL(p);
  let text="Great meeting you, "+first+"! Here's our card — claim your own HiRey page (people and their agents find you there) and connect back: "+url;
  const cardFile=new File([cardBlob],"we-met.jpg",{type:"image/jpeg"});
  const files=[cardFile]; const share=includeContact&&hasMyContact();
  if(share){ try{ files.push(makeMyVCardFile()); }catch(_){} }
  const canMulti=!!(navigator.canShare&&files.length>1&&navigator.canShare({files}));
  // If the vCard file can't ride along, fold the private contact into the message text — same private channel, still only this person.
  if(share&&!canMulti){ const c=[getMyPhone(),getMyEmail()].filter(Boolean).join("  ·  "); if(c) text+="\n\nReach me directly: "+c; }
  let sent=false;
  try{
    if(canMulti){ await navigator.share({files,text,title:"HiRey"}); sent=true; }
    else if(navigator.canShare&&navigator.canShare({files:[cardFile]})){ await navigator.share({files:[cardFile],text,title:"HiRey"}); sent=true; }
    else if(navigator.share){ await navigator.share({text,url}); sent=true; }
  }catch(e){ if(e&&e.name==="AbortError") return false; }
  if(!sent){ try{ await navigator.clipboard.writeText(text); toast("Link copied — paste it to "+first); }catch(_){}
    const a=document.createElement("a"); a.href=URL.createObjectURL(cardBlob); a.download="we-met-"+first+".jpg"; document.body.appendChild(a); a.click(); a.remove(); }
  if(!p.invited){ p.invited=true; await savePerson(p); renderAll(); }
  return sent;
}
async function shareCardPublic(cardBlob, p){ const first=p.name.split(" ")[0];
  const myUrl=myLinktree(); const text="Met "+p.name+" today 🤝  ·  I'm on HiRey → "+(myUrl||"hirey.ai");
  let sent=false;
  try{ const file=new File([cardBlob],"we-met.jpg",{type:"image/jpeg"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],text,title:"Who I Met"}); sent=true; }
    else if(navigator.share){ await navigator.share({text}); sent=true; }
  }catch(e){ if(e&&e.name==="AbortError") return false; }
  if(!sent){ try{ await navigator.clipboard.writeText(text); }catch(_){} const a=document.createElement("a"); a.href=URL.createObjectURL(cardBlob); a.download="we-met-"+first+".jpg"; document.body.appendChild(a); a.click(); a.remove(); toast("Card saved — post it anywhere"); }
  return sent;
}
async function presentCard(pid, opt){ const p=personById(pid); if(!p) return;
  const m=state.meetings.find(x=>x.personIds.includes(pid)&&x.photo);
  let card=null, cardURL=""; try{ card=await makeCardBlob(getMyName(), p.name, m&&m.photo, (m&&m.createdAt)||Date.now(), pcolor(p.name).a); cardURL=URL.createObjectURL(card); }catch(_){}
  const first=p.name.split(" ")[0];
  document.getElementById(opt.sheet).innerHTML=`
    <div class="grip"></div>
    <span class="eyebrow sec" style="margin:6px 0 12px">Your we-met card</span>
    <div class="preview-wrap" style="background:transparent;box-shadow:0 8px 22px rgba(20,18,16,.12);border-radius:14px;overflow:hidden">${cardURL?`<img src="${cardURL}" style="object-fit:contain;max-height:56vh">`:`<div class="ct" style="padding:38px;text-align:center">Couldn’t render the card — tap Share to send a link.</div>`}</div>
    <p style="font-size:14px;color:var(--ink-soft);margin:12px 0 0">Send it to ${esc(first)} — you both keep a copy.</p>
    ${hasMyContact()
      ? `<label style="display:flex;align-items:flex-start;gap:10px;margin:14px 2px 0;font-size:13px;color:var(--ink-soft);line-height:1.45;cursor:pointer"><input type="checkbox" id="incContact" checked style="width:18px;height:18px;margin-top:1px;accent-color:var(--green);flex:0 0 auto"><span>Also share my <b style="color:var(--ink)">phone &amp; email</b> with ${esc(first)} — privately, never on your public page.</span></label>`
      : `<button class="btn-soft" id="addMyContact" style="margin-top:12px">＋ Add your phone &amp; email to share privately with ${esc(first)}</button>`}
    <div class="sheet-actions"><button class="btn btn-ghost" id="cardBack">${opt.backLabel||"Back"}</button><button class="btn btn-primary" id="cardShare">Send to ${esc(first)}</button></div>
    <button class="btn btn-ghost" id="cardPost" style="width:100%;margin-top:8px">Post to social instead</button>`;
  showSheet(opt.sheet, opt.scrim);
  document.getElementById("cardBack").onclick=()=>opt.onBack();
  const addC=document.getElementById("addMyContact"); if(addC) addC.onclick=()=>myContactEditor();
  document.getElementById("cardShare").onclick=async()=>{ if(!card){ opt.onBack(); return; }
    const inc=document.getElementById("incContact"); const ok=await shareCard(card,p,inc?inc.checked:false); opt.onBack(); if(ok) toast("Card sent to "+first); };
  document.getElementById("cardPost").onclick=async()=>{ if(!card){ opt.onBack(); return; } await shareCardPublic(card,p); opt.onBack(); };
}
function sendCard(pid){ return presentCard(pid,{sheet:"sheet2",scrim:"scrim2",backLabel:"Back",onBack:()=>renderPerson(pid)}); }

/* ========================= dev seed (console only) ========================= */
function monoBlob(seed){ return new Promise(res=>{ const c=document.createElement("canvas"); c.width=640; c.height=800;
  const x=c.getContext("2d"); const col=pcolor(seed); x.fillStyle=col.t.replace(/[\d.]+\)$/,"1)"); x.fillStyle="#f3efe6"; x.fillRect(0,0,640,800);
  x.fillStyle=col.t; x.fillRect(0,0,640,800);
  x.fillStyle=col.d; x.font="600 250px "+getComputedStyle(document.body).getPropertyValue("--serif");
  x.textAlign="center"; x.textBaseline="middle"; x.fillText(initials(seed),320,420); c.toBlob(res,"image/jpeg",.88); }); }
window._seedDemo=async function(){
  const data=[["Maya Chen","coffee @ Ritual, raising seed"],["Dev Patel","SF AI meetup, wants to found"],
    ["Lena Ortiz","dinner, angel — intro from Sam"],["Tom Walsh",""],["Priya Rao","demo day afterparty, YC W26"],["Kenji Mori","robotics, hiring"]];
  let t=Date.now();
  for(let i=0;i<data.length;i++){ const [name,cap]=data[i]; const id=await resolvePerson(name);
    const p=personById(id); if(i===0){ p.followUp=true; await dbPut("people",p); }
    const reps=i<2?2:1;
    for(let r=0;r<reps;r++){ t-=((i+r)%6+1)*7*3600*1000;
      await dbPut("meetings",{id:uid(),createdAt:t,photo:await monoBlob(name+r),caption:r===0?cap:"",personIds:[id]}); } }
  await loadAll(); renderAll(); toast("Demo data loaded"); console.log("seeded"); };

/* ========================= boot ========================= */
(async()=>{ try{ _db=await openDB(); await loadAll(); renderAll(); startPeopleAvatarWatch(); ensureMyName();
    if(/[?&]diag/.test(location.search)) showStorageDiag();   // ?diag → on-screen local-storage summary (people/moments/photos)
    if(HI.authed()){ (async()=>{ await hiSyncProfile(); await hiRefreshConsent();
      // First-login on this device: push local people/meetings up (idempotent, once per account).
      try{ await migrateLocalToServer(); }catch(_){}
      // Server is the source of truth: pull people, tags, notes, and text meetings down.
      try{ await mergeServerState(); renderAll(); }catch(_){}
      try{ await showMigrateBanner(); }catch(_){}   // surface local people not yet on the cloud (any DB name)
      // Then pull this user's own photo posts (private+public) — parallelized, render as they land.
      try{ await pullMyServerPosts(); renderAll(); }catch(_){}
      // Push any local-only photos up (no-op on a fresh device); local copies already render.
      try{ await syncPendingPhotos(); renderAll(); }catch(_){}
      // Settle: re-render once the async work has landed so the grid never stays on a too-early paint.
      setTimeout(()=>{ try{ renderAll(); startPeopleAvatarWatch(); }catch(_){} }, 1800);
      maybeOfferTextBind(); })(); } }
  catch(err){ document.querySelector("main").innerHTML=`<div class="empty"><h3>Storage unavailable</h3><p>Serve this over http:// (not file://) so your diary can be saved.</p></div>`; console.error(err); } })();
