<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fbfaf7">
<meta name="color-scheme" content="light">
<title>Who I Met · HiRey</title>
<style>
  :root{
    --ink:#161412; --ink-soft:rgba(22,20,18,.62); --ink-faint:rgba(22,20,18,.42);
    --gold:#d18a00; --blue:#2467e8; --green:#34c759; --purple:#7c4dff;
    --paper:#fbfaf7; --card:#ffffff; --line:rgba(22,20,18,.10); --line-2:rgba(22,20,18,.16);
    --shadow:0 18px 48px rgba(20,18,16,.18); --shadow-sm:0 8px 22px rgba(20,18,16,.12);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    --nav-h:60px; --max:480px; color-scheme:light;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.5}
  ::selection{background:var(--ink);color:var(--paper)}
  button{font-family:inherit}
  #app{max-width:var(--max);margin:0 auto;min-height:100vh;background:var(--paper);
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 28px)}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-faint);font-weight:600}
  .eyebrow.sec{display:block;margin:0 0 14px}
  @keyframes livedot{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,.5)}50%{box-shadow:0 0 0 5px rgba(52,199,89,.05)}}
  @keyframes cardin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  /* ---------- header ---------- */
  header{position:sticky;top:0;z-index:30;background:rgba(251,250,247,.85);
    backdrop-filter:saturate(160%) blur(12px);-webkit-backdrop-filter:saturate(160%) blur(12px);
    border-bottom:.5px solid var(--line);padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
    display:flex;align-items:center;gap:12px}
  .brand .t{font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:-.01em;
    line-height:1;display:flex;align-items:center;gap:8px}
  .brand .t .ld{width:8px;height:8px;border-radius:50%;background:var(--green);animation:livedot 2.4s infinite}
  .brand .sub{font-size:11.5px;color:var(--ink-faint);margin-top:5px;font-weight:500}
  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .hdr-count{text-align:right;font-size:12px;color:var(--ink-soft);line-height:1.2;font-weight:500}
  .hdr-count b{font-family:var(--serif);font-size:18px;color:var(--ink);font-weight:600;display:block}
  .add-btn{width:42px;height:42px;border-radius:50%;background:var(--ink);color:#fff;border:0;
    display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s}
  .add-btn:active{transform:scale(.92)}
  .add-btn svg{width:20px;height:20px}
  /* ---------- views ---------- */
  main{padding:22px 18px 26px}
  .view{display:none}
  .view.active{display:block}
  .view-title{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:-.01em;margin:6px 0 0;line-height:1.05}
  /* today hero */
  .hero{padding:4px 2px 22px;border-bottom:.5px solid var(--line);margin-bottom:24px}
  .hero h2{font-family:var(--serif);font-weight:600;font-size:27px;letter-spacing:-.01em;margin:8px 0 20px;line-height:1.12}
  .cap-row{display:flex;gap:10px;flex-wrap:wrap}
  .btn{font-size:14.5px;font-weight:600;padding:13px 22px;cursor:pointer;border:0;border-radius:999px;
    transition:transform .1s, box-shadow .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--ink);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-ghost{background:var(--card);color:var(--ink);border:.5px solid var(--line);box-shadow:var(--shadow-sm)}
  .btn svg{width:17px;height:17px}
  .btn-soft{width:100%;background:rgba(36,103,232,.08);color:var(--blue);box-shadow:none;border:0;justify-content:center}
  .btn-soft:active{background:rgba(36,103,232,.14)}
  .btn-soft svg{width:18px;height:18px}
  .or{display:flex;align-items:center;gap:10px;margin:14px 0 10px;color:var(--ink-faint);font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;font-weight:600}
  .or::before,.or::after{content:"";flex:1;height:.5px;background:var(--line)}
  .mic-row{display:flex;align-items:center;gap:14px;margin:2px 0 16px}
  .mic-btn{width:58px;height:58px;border-radius:50%;border:0;background:var(--ink);color:#fff;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;box-shadow:var(--shadow-sm);transition:transform .1s}
  .mic-btn:active{transform:scale(.93)}
  .mic-btn svg{width:25px;height:25px}
  .mic-btn.live{background:var(--green);animation:micpulse 1.5s infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,.5)}50%{box-shadow:0 0 0 14px rgba(52,199,89,0)}}
  .mic-hint{font-size:13.5px;color:var(--ink-soft);line-height:1.45}
  .privacy{font-size:12.5px;color:var(--ink-soft);margin-top:18px;display:flex;gap:8px;align-items:baseline;line-height:1.5;font-weight:500}
  .privacy svg{width:13px;height:13px;flex:0 0 auto;opacity:.5;transform:translateY(2px)}
  /* Share my card — prominent, labeled, on the default screen (the buried account-sheet entry was hard to find) */
  .share-me{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--card);
    border:.5px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:14px 15px;margin:18px 0 24px;cursor:pointer;font:inherit;color:var(--ink);transition:transform .1s}
  .share-me:active{transform:translateY(1px)}
  .share-me .ico{width:38px;height:38px;border-radius:50%;background:rgba(36,103,232,.1);color:var(--blue);display:grid;place-items:center;flex:0 0 auto}
  .share-me .ico svg{width:19px;height:19px}
  .share-me .txt{flex:1;min-width:0}
  .share-me .txt b{font-family:var(--serif);font-size:16px;font-weight:600;display:block;line-height:1.2}
  .share-me .txt small{font-size:12.5px;color:var(--ink-soft);display:block;margin-top:2px;line-height:1.35}
  .share-me .arr{width:16px;height:16px;color:var(--ink-faint);flex:0 0 auto}
  /* day label */
  .day-label{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
  .day-label .d{font-family:var(--serif);font-style:italic;font-size:18px;font-weight:500;white-space:nowrap}
  .day-label .c{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);white-space:nowrap;font-weight:600}
  .day-label::after{content:"";flex:1;height:.5px;background:var(--line)}
  /* meeting card */
  .card{background:var(--card);border-radius:18px;box-shadow:var(--shadow-sm);overflow:hidden;
    margin-bottom:16px;animation:cardin .42s cubic-bezier(.2,.8,.2,1) both}
  .card .ph{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:#f0ece2}
  .card .body{padding:13px 16px 16px}
  .card .who{display:flex;flex-wrap:wrap;gap:5px 16px;align-items:center;margin-bottom:6px}
  .chip{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink);cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;line-height:1.25}
  .chip:active{opacity:.6}
  .chip .pd{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .chip.add{font-family:var(--sans);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);font-weight:600}
  .card .cap{font-size:14.5px;color:var(--ink-soft);margin:0;line-height:1.5}
  .card .meta{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);margin-top:10px;font-weight:600}
  .meta-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
  .meta-row .meta{margin-top:0}
  .card-share{font-size:12.5px;font-weight:600;color:#fff;background:var(--ink);border:0;border-radius:999px;padding:8px 15px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
  .card-share svg{width:15px;height:15px}
  .card-share:active{transform:translateY(1px)}
  .btn-mic{width:100%;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:9px;background:rgba(52,199,89,.12);color:#1d7c3e;border:0;border-radius:14px;padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-mic svg{width:19px;height:19px;flex:0 0 auto}
  .btn-mic:active{transform:translateY(1px)}
  .btn-mic.live{background:var(--green);color:#fff;animation:micpulse 1.5s infinite}
  .crm-grid{display:grid;gap:10px;margin-top:14px}
  .crm-grid label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);font-weight:600}
  .crm-grid input{margin-top:5px}
  .cadence{display:flex;gap:8px;margin-top:4px}
  .cad{flex:1;font-size:13px;font-weight:600;padding:10px;border:.5px solid var(--line-2);background:var(--card);color:var(--ink);border-radius:12px;cursor:pointer;font-family:inherit}
  .cad.on{background:var(--green);color:#fff;border-color:transparent}
  .follow-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  /* stats */
  .stats{display:flex;background:var(--card);border-radius:16px;box-shadow:var(--shadow-sm);margin:18px 0 26px;overflow:hidden}
  .stat{flex:1;padding:15px 6px 13px;text-align:center;border-left:.5px solid var(--line)}
  .stat:first-child{border-left:0}
  .stat b{font-family:var(--serif);font-size:25px;font-weight:600;display:block;line-height:1}
  .stat span{font-size:9.5px;text-transform:uppercase;letter-spacing:.11em;color:var(--ink-faint);display:block;margin-top:7px;font-weight:600}
  /* people grid */
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px 14px}
  .person{cursor:pointer;animation:cardin .42s cubic-bezier(.2,.8,.2,1) both}
  .ava-wrap{position:relative;width:84%;margin:0 auto}
  .ava{width:100%;aspect-ratio:1;border-radius:50%;object-fit:cover;background:#fff;display:block}
  .ava-fb{display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:24px}
  .person .nm{font-family:var(--serif);font-size:15px;font-weight:600;margin-top:12px;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .person .ct{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);text-align:center;margin-top:3px;font-weight:600}
  .dot{position:absolute;bottom:4px;right:4px;width:14px;height:14px;border-radius:50%;background:var(--green);
    border:2.5px solid var(--paper);animation:livedot 2.4s infinite}
  /* empty */
  .empty{text-align:center;color:var(--ink-soft);padding:50px 24px}
  .empty .ico{width:46px;height:46px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;
    background:rgba(52,199,89,.12);color:var(--green)}
  .empty .ico svg{width:22px;height:22px}
  .empty h3{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--ink);margin:0 0 7px}
  .empty p{margin:0 auto;font-size:14px;max-width:240px;line-height:1.55;font-weight:500}
  /* ---------- floating nav ---------- */
  nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 10px);
    width:calc(100% - 24px);max-width:calc(var(--max) - 20px);height:var(--nav-h);
    background:rgba(251,250,247,.9);backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);
    border:.5px solid var(--line);border-radius:22px;box-shadow:var(--shadow);display:flex;z-index:40}
  .tab{flex:1;background:none;border:0;cursor:pointer;color:var(--ink-faint);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:4px}
  .tab svg{width:21px;height:21px}
  .tab span{font-size:10.5px;font-weight:600;letter-spacing:.01em}
  .tab.active{color:var(--ink)}
  .tab.active svg{stroke-width:2}
  /* ---------- sheets ---------- */
  .scrim{position:fixed;inset:0;background:rgba(22,20,18,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(2px)}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(100%);bottom:0;width:100%;
    max-width:var(--max);background:var(--paper);z-index:60;border-radius:24px 24px 0 0;
    padding:8px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -12px 44px rgba(20,18,16,.22);
    transition:transform .3s cubic-bezier(.2,.8,.2,1);max-height:93vh;overflow-y:auto}
  .sheet.show{transform:translateX(-50%) translateY(0)}
  .grip{width:38px;height:4px;border-radius:999px;background:var(--line-2);margin:9px auto 16px}
  .sheet h2{font-family:var(--serif);font-size:25px;font-weight:600;letter-spacing:-.01em;margin:0 0 16px}
  .preview-wrap{margin-bottom:16px}
  .preview-wrap img{width:100%;display:block;max-height:46vh;object-fit:cover;border-radius:16px}
  .field-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--ink-faint);margin:0 0 9px;font-weight:600}
  input[type=text],textarea{width:100%;font-family:inherit;font-size:16px;padding:13px 16px;border-radius:14px;
    border:.5px solid var(--line-2);background:var(--card);color:var(--ink);outline:none;transition:border .15s,box-shadow .15s}
  input[type=text]::placeholder{color:var(--ink-faint)}
  input[type=text]:focus,textarea:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(22,20,18,.06)}
  textarea{resize:vertical;min-height:66px;line-height:1.5}
  .added{display:flex;flex-wrap:wrap;gap:8px;margin:13px 0 0}
  .added .tag{font-family:var(--serif);font-size:15px;font-weight:600;border-radius:999px;padding:7px 14px;cursor:pointer;
    display:inline-flex;gap:8px;align-items:center}
  .added .tag .x{font-family:var(--sans);font-size:13px;font-weight:600;opacity:.6}
  .suggest{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
  .suggest .s{background:var(--card);border:.5px solid var(--line);color:var(--ink-soft);font-size:13.5px;font-weight:500;
    padding:7px 14px;cursor:pointer;border-radius:999px;box-shadow:var(--shadow-sm)}
  .suggest .s:hover{color:var(--ink)}
  .suggest .s.hi{display:inline-flex;align-items:center;gap:7px;border-color:rgba(36,103,232,.28);color:var(--ink)}
  .suggest .s.hi .s-tag{font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--blue);background:rgba(36,103,232,.12);padding:2px 6px;border-radius:999px}
  .suggest .s-load{align-self:center;font-size:11.5px;color:var(--ink-faint);font-weight:500;padding:7px 4px;display:inline-flex;align-items:center;gap:6px}
  .suggest .s-load::before{content:"";width:9px;height:9px;border-radius:50%;border:1.5px solid var(--line-2);border-top-color:var(--blue);animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sheet-actions{display:flex;gap:10px;margin-top:20px}
  .sheet-actions .btn{flex:1}
  .hidden{display:none!important}
  /* person detail */
  .pd-head{display:flex;align-items:center;gap:15px;margin-bottom:2px}
  .pd-head .ava{width:62px;height:62px;flex:0 0 auto}
  .pd-head .nm{font-family:var(--serif);font-size:24px;font-weight:600;line-height:1.1}
  .pd-head .ct{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);margin-top:6px;font-weight:600}
  .pd-actions{display:flex;gap:8px;margin:18px 0;flex-wrap:wrap}
  .dot.inv{background:var(--gold);animation:none}
  .mini{font-size:12.5px;font-weight:600;padding:9px 15px;border:.5px solid var(--line-2);
    background:var(--card);color:var(--ink);cursor:pointer;border-radius:999px;box-shadow:var(--shadow-sm)}
  .mini.on{background:var(--green);color:#fff;border-color:transparent}
  .thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
  .thumbs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:13px}
  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 30px);transform:translateX(-50%) translateY(18px);
    background:var(--ink);color:#fff;font-size:14px;font-weight:500;padding:12px 20px;border-radius:999px;
    z-index:80;opacity:0;transition:all .25s;max-width:88%;text-align:center;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ---------- account / sign-in ---------- */
  .acct-btn{display:flex;align-items:center;gap:7px;background:none;border:0;cursor:pointer;padding:0;font:inherit;color:inherit;text-align:left}
  .acct-ava{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:13px;flex:0 0 auto;background:rgba(36,103,232,.12);color:var(--blue);box-shadow:0 0 0 1.5px var(--line)}
  .acct-ava.live{box-shadow:0 0 0 2px var(--green)}
  .acct-ava img{width:100%;height:100%;border-radius:50%;object-fit:cover}
  .seg{display:flex;gap:6px;background:rgba(22,20,18,.05);padding:4px;border-radius:14px;margin:2px 0 18px}
  .seg button{flex:1;border:0;background:none;cursor:pointer;font:inherit;font-size:13.5px;font-weight:600;color:var(--ink-soft);padding:9px 4px;border-radius:11px;transition:background .15s,color .15s}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}
  .auth-msg{font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin:0 0 16px}
  .auth-msg b{color:var(--ink);font-weight:600}
  .btn-google{width:100%;background:var(--card);color:var(--ink);border:.5px solid var(--line-2);box-shadow:var(--shadow-sm);gap:10px}
  .btn-google svg{width:18px;height:18px}
  .acct-card{display:flex;align-items:center;gap:14px;padding:4px 0 6px}
  .acct-card .big{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:21px;flex:0 0 auto;background:rgba(36,103,232,.12);color:var(--blue);box-shadow:0 0 0 2px var(--green)}
  .acct-card .big img{width:100%;height:100%;border-radius:50%;object-fit:cover}
  .acct-card .nm{font-family:var(--serif);font-size:21px;font-weight:600;line-height:1.1}
  .acct-card .ct{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.35}
  .acct-card .ct .v{color:var(--green);font-weight:600}
  .row-link{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;background:var(--card);border:.5px solid var(--line);border-radius:14px;box-shadow:var(--shadow-sm);padding:14px 16px;cursor:pointer;font:inherit;color:var(--ink);font-size:14.5px;font-weight:600;margin-top:10px;text-align:left}
  .row-link .sub{display:block;font-size:12px;color:var(--ink-faint);font-weight:500;margin-top:3px}
  .row-link>span:first-child{display:block}
  .row-link svg{width:16px;height:16px;color:var(--ink-faint);flex:0 0 auto}
  .hi-badge{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;padding:3px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;vertical-align:middle}
  .hi-badge.on{background:rgba(52,199,89,.14);color:#1d7c3e}
  .hi-badge.pending{background:rgba(209,138,0,.14);color:#8a5c00}
  .hi-badge svg{width:10px;height:10px}
  .pd-hi{margin:18px 0 4px;padding:15px 16px;background:rgba(36,103,232,.05);border:.5px solid rgba(36,103,232,.14);border-radius:16px}
  .pd-hi h4{margin:0 0 4px;font-family:var(--serif);font-size:16px;font-weight:600}
  .pd-hi p{margin:0 0 12px;font-size:12.5px;color:var(--ink-soft);line-height:1.45}
  .pd-hi input{margin-bottom:10px}
  .dot.hi{background:var(--blue);animation:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <div class="t"><span class="ld"></span>Who I Met</div>
      <div class="sub" id="hdrSub">by HiRey · live on this device</div>
    </div>
    <div class="hdr-right">
      <button class="acct-btn" id="navAcct" aria-label="Account"><span class="acct-ava" id="acctAva"></span></button>
      <div class="hdr-count"><b id="hdrCount">0</b>people</div>

<script>
"use strict";
/* ========================= storage (IndexedDB) ========================= */
const DB_NAME="wimt-db", DB_VER=1; let _db=null;
function openDB(){ return new Promise((res,rej)=>{ const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{ const db=e.target.result;
    if(!db.objectStoreNames.contains("people")) db.createObjectStore("people",{keyPath:"id"});
    if(!db.objectStoreNames.contains("meetings")){ const s=db.createObjectStore("meetings",{keyPath:"id"}); s.createIndex("createdAt","createdAt"); } };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function store(s,m){ return _db.transaction(s,m).objectStore(s); }
function dbGetAll(s){ return new Promise((res,rej)=>{ const r=store(s,"readonly").getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function dbPut(s,v){ return new Promise((res,rej)=>{ const r=store(s,"readwrite").put(v); r.onsuccess=()=>res(v); r.onerror=()=>rej(r.error); }); }
function dbDel(s,k){ return new Promise((res,rej)=>{ const r=store(s,"readwrite").delete(k); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }

/* ========================= Hi platform (optional cloud sync) ========================= */
/* On-device first: nothing leaves this device until you sign in. Signing in only
   unlocks (1) your real HiRey profile on the we-met cards, and (2) sending a
   real, consented claim to a person you met (they get to accept or decline). */
const HI={
  base:"https://hi.hirey.ai",
  KEY:"wimt_hi",
  profile:null,            // cached owner_profile once signed in
  consent:new Map(),       // norm(name) -> consent_state ('approved'|'declined'|'pending')
  session(){ try{ return JSON.parse(localStorage.getItem(this.KEY)||"null"); }catch(_){ return null; } },
  save(s){ localStorage.setItem(this.KEY,JSON.stringify(s)); },
  clear(){ localStorage.removeItem(this.KEY); this.profile=null; this.consent.clear(); },
  authed(){ const s=this.session(); return !!(s&&s.access_token&&(!s.expires_at||s.expires_at>Date.now())); },
  myName(){ return (this.profile&&this.profile.display_name)||(this.session()&&this.session().display_name)||""; },
  async post(path,body,withAuth){
    const headers={"content-type":"application/json"};
    if(withAuth){ const s=this.session(); if(s&&s.access_token) headers.authorization="Bearer "+s.access_token; }
    const r=await fetch(this.base+path,{method:"POST",headers,body:JSON.stringify(body||{})});
    let j={}; try{ j=await r.json(); }catch(_){}
    if(!r.ok){ const e=new Error(j.error||j.error_code||("http_"+r.status)); e.status=r.status; e.body=j; throw e; }
    return j;
  },
  // capability call -> returns the inner `result` object, throws on error envelope
  async call(cap,body){
    const j=await this.post("/v1/capabilities/"+cap+"/call",body,true);
    if(j&&j.error){ const e=new Error(j.error); e.body=j; throw e; }
    return (j&&j.result)||j;
  },
  onToken(tok){
    const ttl=(tok.expires_in||86400)*1000;
    this.save({ access_token:tok.access_token, expires_at:Date.now()+ttl-60000,
      agent_id:tok.agent_id, workspace_id:tok.workspace_id, display_name:(this.session()&&this.session().display_name)||"" });
  },
};
async function hiSyncProfile(){ if(!HI.authed()) return null;
  try{ const r=await HI.call("hi.owners",{action:"get"}); const p=r.owner_profile||r;
    HI.profile=p; const s=HI.session()||{}; s.display_name=p.display_name||s.display_name; s.owner_public_url=r.owner_public_url; HI.save(s);
    return p;
  }catch(e){ if(e.status===401||e.body&&e.body.error==="token_expired"){ HI.clear(); } return null; } }
async function hiRefreshConsent(){ if(!HI.authed()) return;
  try{ const r=await HI.call("hi.connectors",{action:"list_met"}); HI.consent.clear();
    for(const m of (r.met||[])){ if(m.met_display_name) HI.consent.set(norm(m.met_display_name),{state:m.consent_state,intro_id:m.intro_id,pairing:m.resulting_pairing_id}); }
  }catch(_){} }
function hiConsentFor(p){ if(!p) return null; return HI.consent.get(p.nameLower||norm(p.name))||null; }

/* ========================= state / helpers ========================= */
const state={ people:[], meetings:[], urls:new Map() };
const uid=()=>(Date.now().toString(36)+Math.random().toString(36).slice(2,8));
const norm=s=>s.trim().toLowerCase().replace(/\s+/g," ");
const esc=s=>(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const initials=name=>{ const p=name.trim().split(/\s+/); return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase()||"?"; };
const PCOLORS=[
  {a:"#d18a00",d:"#8a5c00",g:"rgba(209,138,0,.42)",t:"rgba(209,138,0,.15)"},
  {a:"#2467e8",d:"#1b4fb8",g:"rgba(36,103,232,.40)",t:"rgba(36,103,232,.13)"},
  {a:"#34c759",d:"#1d7c3e",g:"rgba(52,199,89,.42)",t:"rgba(52,199,89,.16)"},
  {a:"#7c4dff",d:"#5b32c7",g:"rgba(124,77,255,.40)",t:"rgba(124,77,255,.14)"},
];
const pcolor=seed=>{ let h=0; for(const c of (seed||"?")) h=(h*31+c.charCodeAt(0))>>>0; return PCOLORS[h%4]; };

async function loadAll(){
  state.people=await dbGetAll("people");
  state.meetings=(await dbGetAll("meetings")).sort((a,b)=>b.createdAt-a.createdAt);
  for(const [,u] of state.urls) URL.revokeObjectURL(u); state.urls.clear();
  for(const m of state.meetings){ if(m.photo) state.urls.set(m.id,URL.createObjectURL(m.photo)); }
}
const photoURL=m=>state.urls.get(m.id)||"";
const personById=id=>state.people.find(p=>p.id===id);
const meetCount=pid=>state.meetings.filter(m=>m.personIds.includes(pid)).length;
const latestPhotoFor=pid=>{ const m=state.meetings.find(m=>m.personIds.includes(pid)&&m.photo); return m?photoURL(m):""; };
function avaHTML(p){ const c=pcolor(p.name), av=latestPhotoFor(p.id);
  const ring=`box-shadow:0 0 0 2.5px ${c.a}, 0 4px 15px ${c.g}`;
  return av?`<img class="ava" src="${av}" style="${ring}">`
    :`<div class="ava ava-fb" style="background:${c.t};color:${c.d};${ring}">${initials(p.name)}</div>`; }

async function resolvePerson(name){ const n=norm(name); if(!n) return null;
  let p=state.people.find(p=>p.nameLower===n); if(p) return p.id;
  p={ id:uid(), name:name.trim(), nameLower:n, note:"", phone:"", email:"", introBy:"", followCadence:"off", lastPing:0, followUp:false, createdAt:Date.now() };
  await dbPut("people",p); state.people.push(p); return p.id; }

function downscale(file,max=1400,q=.85){ return new Promise(res=>{ const img=new Image();
  img.onload=()=>{ let{width:w,height:h}=img; if(Math.max(w,h)>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    c.toBlob(b=>res(b||file),"image/jpeg",q); };
  img.onerror=()=>res(file); img.src=URL.createObjectURL(file); }); }

/* ========================= live name search (on-device + Hi DB) ========================= */
/* Performance: instant on-device matches render first; the Hi full-DB search is
   debounced (220ms), stale responses are dropped (seq), and every query is cached.
   Only fires when signed in and q>=2. Falls back to adding the raw string on Enter. */
const _nameSearch={ seq:0, t:null, cache:new Map(), results:[], q:"", byName:new Map() };
function liveNameSearch(q, cb){
  q=(q||"").trim(); const key=norm(q);
  if(!HI.authed()||key.length<2){ _nameSearch.q=q; _nameSearch.results=[]; cb&&cb(); return; }
  if(_nameSearch.cache.has(key)){ _nameSearch.q=q; _nameSearch.results=_nameSearch.cache.get(key); cb&&cb(); return; }
  const seq=++_nameSearch.seq; clearTimeout(_nameSearch.t);
  _nameSearch.t=setTimeout(async()=>{
    try{
      const r=await HI.call("hi.owners",{action:"search",q,typeahead:true,limit:8});
      const people=(r.people||[]).filter(p=>p&&p.display_name).map(p=>({
        display_name:p.display_name, headline:p.headline||"",
        customer_id:p.owner_customer_id||p.customer_id||null, owner_public_url:p.owner_public_url||null, avatar_url:p.avatar_url||null }));
      _nameSearch.cache.set(key,people);
      if(seq===_nameSearch.seq){ _nameSearch.q=q; _nameSearch.results=people; cb&&cb(); }
    }catch(_){ if(seq===_nameSearch.seq){ _nameSearch.q=q; _nameSearch.results=[]; cb&&cb(); } }
  },220);
}
// Render suggestion chips into suggestEl: on-device matches (extraNames + diary), then Hi DB matches.
function buildNameSuggest(suggestEl, q, addFn, extraNames){
  if(!suggestEl) return;
  q=(q||"").trim(); const qn=norm(q); const added=new Set(pending.names.map(norm));
  const recent=state.people.slice().sort((a,b)=>meetCount(b.id)-meetCount(a.id)).map(p=>p.name);
  let pool=[...(extraNames||[]), ...recent]; const seen=new Set();
  pool=pool.filter(n=>{ const k=norm(n); if(!k||seen.has(k)||added.has(k)) return false; seen.add(k); return true; });
  if(qn) pool=pool.filter(n=>norm(n).includes(qn));
  const local=pool.slice(0,6); const localSet=new Set(local.map(norm));
  const hi=(HI.authed()&&qn.length>=2&&norm(_nameSearch.q)===qn)?_nameSearch.results:[];
  const hiList=hi.filter(p=>p.display_name&&!added.has(norm(p.display_name))&&!localSet.has(norm(p.display_name))).slice(0,6);
  hiList.forEach(p=>_nameSearch.byName.set(norm(p.display_name),p));
  const loading=HI.authed()&&qn.length>=2&&norm(_nameSearch.q)!==qn;
  suggestEl.innerHTML=
    local.map(n=>`<button class="s" data-add="${esc(n)}">+ ${esc(n)}</button>`).join("")
    + hiList.map(p=>`<button class="s hi" data-add="${esc(p.display_name)}" title="${esc(p.headline||'on HiRey')}">${esc(p.display_name)}<span class="s-tag">HiRey</span></button>`).join("")
    + (loading?`<span class="s-load">searching HiRey…</span>`:"");
  suggestEl.querySelectorAll(".s").forEach(b=>b.onclick=()=>{
    const nm=b.dataset.add, hd=b.classList.contains("hi")?_nameSearch.byName.get(norm(nm)):null; addFn(nm,hd); });
}
// Wire a name input to the live suggestions: instant local render + debounced Hi search.
function wireNameInput(queryEl, suggestEl, addFn, extraFn){
  if(!queryEl) return;
  const render=()=>buildNameSuggest(suggestEl, queryEl.value, addFn, extraFn?extraFn():[]);
  queryEl.addEventListener("input",()=>{ render(); liveNameSearch(queryEl.value, render); });
  render();
}
async function applyPendingHiLinks(){
  if(!pending.hi) return;
  for(const k of Object.keys(pending.hi)){ const hi=pending.hi[k];
    const p=state.people.find(x=>x.nameLower===k); if(p&&!p.hiOwner){ p.hiOwner=hi; await dbPut("people",p); } }
}

/* ========================= capture sheet ========================= */
let pending={ blob:null, url:"", names:[] };
function openCaptureSheet(blob){ pending={ blob, url:URL.createObjectURL(blob), names:[] };
  renderCaptureSheet(); showSheet("sheet","scrim"); setTimeout(()=>document.getElementById("nameInput")?.focus(),340); }
function renderCaptureSheet(){
  document.getElementById("sheet").innerHTML=`
    <div class="grip"></div>
    <h2>Who did you meet?</h2>
    <div class="preview-wrap"><img src="${pending.url}" alt=""></div>
    <input type="text" id="nameInput" placeholder="${HI.authed()?"Type a name — search HiRey, or Enter to add":"Type a name, then Enter"}" autocomplete="off" autocapitalize="words">
    ${SR?`<button class="btn-mic" id="nameMic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg><span id="micLbl">Or just talk — their name + anything about them</span></button>`:""}
    <div class="added" id="added">${pending.names.map(n=>{ const c=pcolor(n);
      return `<span class="tag" data-n="${esc(n)}" style="background:${c.t};color:${c.d}">${esc(n)} <span class="x">&times;</span></span>`; }).join("")}</div>
    <div class="suggest" id="nameSuggest"></div>
    <div class="field-label" style="margin-top:20px">Note &mdash; optional</div>
    <input type="text" id="capNote" placeholder="coffee @ Ritual, talked about the seed round" autocomplete="off">
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="capSaveOnly">Just save</button>
      <button class="btn btn-primary" id="capSave">Send card &rarr;</button>
    </div>`;
  const input=document.getElementById("nameInput");
  input.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); addName(input.value); input.value=""; }});
  wireNameInput(input, document.getElementById("nameSuggest"), addName);
  const nMic=document.getElementById("nameMic"); if(nMic) nMic.onclick=dictateName;
  document.querySelectorAll("#added .tag").forEach(c=>c.onclick=()=>{ pending.names=pending.names.filter(n=>n!==c.dataset.n); renderCaptureSheet(); });
  document.getElementById("capSaveOnly").onclick=()=>saveMoment(false);
  document.getElementById("capSave").onclick=()=>saveMoment(true);
}
function addName(v, hi){ const n=(v||"").trim(); if(!n) return; if(!pending.names.some(x=>norm(x)===norm(n))) pending.names.push(n);
  if(hi){ (pending.hi||(pending.hi={}))[norm(n)]=hi; }
  renderCaptureSheet(); document.getElementById("nameInput")?.focus(); }
function dictateName(){ if(!SR) return; let r2; try{ r2=new SR(); }catch(_){ return; }
  r2.lang=navigator.language||"en-US"; r2.interimResults=true;
  const inp=document.getElementById("nameInput"), btn=document.getElementById("nameMic"), lbl=document.getElementById("micLbl");
  const off=()=>{ if(btn) btn.classList.remove("live"); if(lbl) lbl.textContent="Or just talk — their name + anything about them"; };
  if(btn) btn.classList.add("live"); if(lbl) lbl.textContent="Listening… just talk";
  r2.onresult=e=>{ let t=""; for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript; if(inp) inp.value=t; };
  r2.onerror=off;
  r2.onend=()=>{ off(); const v=inp&&inp.value.trim(); if(!v) return; if(inp) inp.value="";
    const names=detectNames(v);
    if(names.length){ addName(names[0]);
      const rest=v.replace(new RegExp(names[0].replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i"),"").replace(/^[\s,.;:—-]+|[\s,.;:—-]+$/g,"").trim();
      const note=document.getElementById("capNote"); if(note&&rest.length>2&&!note.value.trim()) note.value=rest;
    } else { addName(v); } };
  try{ r2.start(); }catch(_){ if(btn) btn.classList.remove("live"); } }
function closeCaptureSheet(){ if(typeof stopRec==="function") stopRec(); hideSheet("sheet","scrim"); if(pending.url) URL.revokeObjectURL(pending.url); pending={blob:null,url:"",names:[]}; }
async function saveMoment(shareAfter){
  const note=document.getElementById("capNote").value.trim();
  const stray=document.getElementById("nameInput").value.trim(); if(stray) addName(stray);
  const blob=pending.blob;
  const ids=[]; for(const n of pending.names){ const id=await resolvePerson(n); if(id) ids.push(id); }
  await applyPendingHiLinks();
  await dbPut("meetings",{ id:uid(), createdAt:Date.now(), photo:blob, caption:note, personIds:ids });
  if(pending.url) URL.revokeObjectURL(pending.url); pending={blob:null,url:"",names:[]};
  await loadAll(); renderAll(); switchView("today");
  if(shareAfter && ids.length){ await presentCard(ids[0], {sheet:"sheet",scrim:"scrim",backLabel:"Done",onBack:()=>hideSheet("sheet","scrim")}); }
  else { hideSheet("sheet","scrim"); toast(ids.length?`Saved — met ${ids.map(i=>personById(i).name).join(", ")}`:"Moment saved"); }
}

/* ========================= person detail ========================= */
function openPerson(pid){ renderPerson(pid); showSheet("sheet2","scrim2"); }
const CAD_DAYS={weekly:7,monthly:30,daily:1};
function isDue(p){ if(!p.followCadence||p.followCadence==="off") return false; const d=CAD_DAYS[p.followCadence]||9999; return (Date.now()-(p.lastPing||p.createdAt||0))>=d*864e5; }
function parsePersonSpeech(text){ const out={}; const t=text;
  const em=t.replace(/\s+at\s+/gi,"@").replace(/\s+dot\s+/gi,".").match(/[\w.+-]+@[\w-]+\.[\w.-]+/); if(em) out.email=em[0];
  const ph=t.match(/(\+?\d[\d\s().\-]{6,}\d)/); if(ph) out.phone=ph[1].replace(/\s+/g," ").trim();
  let ib=t.match(/intro(?:duced)?(?:'d)?\s+(?:by|through|via)\s+([A-Za-z][\w'’.-]*(?:\s+[A-Z][\w'’.-]*)?)/i)
       || t.match(/(?:通过|经过|经)\s*([^\s,，。、]{1,8}?)\s*介绍/) || t.match(/([^\s,，。、]{2,8}?)\s*介绍(?:认识|的)/);
  if(ib) out.introBy=ib[1].trim();
  if(/每\s*周|每\s*星期|每周|every\s+(?:week|friday|fri)|weekly/i.test(t)) out.followCadence="weekly";
  else if(/每\s*月|每月|every\s+month|monthly/i.test(t)) out.followCadence="monthly";
  else if(/每\s*天|每天|every\s+day|daily/i.test(t)) out.followCadence="daily";
  return out; }
function makeICS(p){ const f=p.followCadence, freq=f==="weekly"?"WEEKLY":f==="monthly"?"MONTHLY":"DAILY";
  const rrule="RRULE:FREQ="+freq+(f==="weekly"?";BYDAY=FR":"");
  const now=new Date(), day=now.toISOString().slice(0,10).replace(/-/g,""), stamp=now.toISOString().replace(/[-:]/g,"").replace(/\.\d+/,"");
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//HiRey//Who I Met//EN","BEGIN:VEVENT","UID:wim-"+p.id+"@hirey.ai","DTSTAMP:"+stamp,"DTSTART;VALUE=DATE:"+day,rrule,"SUMMARY:Follow up with "+p.name,"DESCRIPTION:Ping "+p.name+" — from Who I Met (HiRey).","END:VEVENT","END:VCALENDAR"].join("\r\n");

async function shareICS(p){ const blob=makeICS(p), file=new File([blob],"followup-"+p.name.split(" ")[0]+".ics",{type:"text/calendar"});

/* ========================= save to contacts (vCard) =========================
   Core single-player CRM value: one tap drops the person you met — their face,
   where/when you met, your notes — straight into the phone address book. Works
   with zero network and zero claim. */
function vcEscape(s){ return (s||"").replace(/\\/g,"\\\\").replace(/\r?\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;"); }
function foldVC(line){ if(line.length<=73) return line;
  let out=line.slice(0,73), rest=line.slice(73);
  while(rest.length){ out+="\r\n "+rest.slice(0,72); rest=rest.slice(72); } return out; }
function blobToB64(blob){ return new Promise(res=>{ const r=new FileReader();
  r.onloadend=()=>{ const s=String(r.result||""), i=s.indexOf(","); res(i>=0?s.slice(i+1):""); };
  r.onerror=()=>res(""); r.readAsDataURL(blob); }); }
async function makeVCard(p){
  const ms=state.meetings.filter(m=>m.personIds.includes(p.id));
  const hi=p.hiOwner||{}, title=(p.title||hi.headline||"").trim();
  const parts=p.name.trim().split(/\s+/), given=parts[0]||p.name, family=parts.length>1?parts.slice(1).join(" "):"";
  const note=[]; if(ms[0]){ note.push("Met "+relDay(ms[0].createdAt)+(ms[0].caption?" — "+ms[0].caption:"")); }
  if(p.introBy) note.push("Intro’d by "+p.introBy);
  if(p.note) note.push(p.note);
  note.push("Saved from Who I Met · HiRey");
  const L=["BEGIN:VCARD","VERSION:3.0","N:"+vcEscape(family)+";"+vcEscape(given)+";;;","FN:"+vcEscape(p.name)];
  if(title) L.push("TITLE:"+vcEscape(title));
  if(p.phone) L.push("TEL;TYPE=CELL:"+vcEscape(p.phone));
  if(p.email) L.push("EMAIL;TYPE=INTERNET:"+vcEscape(p.email));
  if(hi.owner_public_url) L.push("URL:"+vcEscape(hi.owner_public_url));
  L.push("NOTE:"+vcEscape(note.join("\n")));
  const photoM=ms.find(m=>m.photo);
  if(photoM&&photoM.photo){ try{ const b64=await blobToB64(await downscale(photoM.photo,500,.8));
    if(b64) L.push(foldVC("PHOTO;ENCODING=b;TYPE=JPEG:"+b64)); }catch(_){} }
  L.push("END:VCARD"); return L.join("\r\n");
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition; let rec=null, listening=false;
const VSTOP=new Set("i im met meet saw seen see today yesterday tomorrow morning afternoon evening tonight night at we the a an and or but with to of in on for from he she they them my his her their your our it its this that these those then so also too just had has have having got get gonna was were is are be been new old some nice great good cool awesome guy girl dude folks people founder cofounder ceo cto coo cfo vp head lead vc angel investor partner engineer designer pm coffee lunch dinner drinks brunch breakfast meeting call event party afterparty mixer demo day talk talked talking spoke speaking chat chatting chatted ran run running into about over here there really very super".split(" "));
function detectNames(text){ const out=[], seen=new Set(pending.names.map(norm)); const low=" "+text.toLowerCase().replace(/[^\w\s'’]/g," ")+" ";
  for(const p of state.people){ if(p.nameLower&&low.includes(" "+p.nameLower+" ")&&!seen.has(p.nameLower)){ out.push(p.name); seen.add(p.nameLower);} }
  const re=/\b([A-Z][a-zA-Z'’]+(?:\s+[A-Z][a-zA-Z'’]+){0,2})\b/g; let m;
  while((m=re.exec(text))){ const parts=m[1].trim().split(/\s+/).filter(w=>!VSTOP.has(w.toLowerCase()));
    if(!parts.length) continue; const name=parts.join(" "); if(name.length<2||seen.has(norm(name))) continue; out.push(name); seen.add(norm(name)); }
  return out.slice(0,8); }

const CLAIM_BASE="https://walter2wer.github.io/who-i-met-today/claim/";
function getMyName(){ return (HI.myName()||localStorage.getItem("wim_my_name")||"").trim()||"A friend"; }
function myLinktree(){ return (HI.profile&&HI.profile.owner_public_url)||((HI.session()||{}).owner_public_url)||""; }
function myAvatar(){ return (HI.profile&&(HI.profile.avatar||HI.profile.avatar_url||HI.profile.avatar_thumb_url))||""; }
/* Build the claim/we-met link carrying the SENDER's identity inline — so the
   person you met can see who you are at a glance (face, headline, links) even
   when they re-open the link days later, without clicking through to LinkedIn. */
function claimURL(p){ const E=encodeURIComponent, pr=HI.profile||{};
  const on=new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"});
  const myUrl=myLinktree(), myPic=myAvatar();
  let u=CLAIM_BASE+"?from="+E(getMyName())+"&name="+E(p.name)+"&on="+E(on);
  if(myUrl) u+="&me="+E(myUrl);
  if(myPic) u+="&pic="+E(myPic);
  if(pr.headline) u+="&hl="+E(pr.headline);
  if(pr.twitter_handle) u+="&tw="+E(pr.twitter_handle);
  if(pr.website_url) u+="&web="+E(pr.website_url);
  if(pr.linkedin_url) u+="&li="+E(pr.linkedin_url);
  if(pr.bio_markdown) u+="&bio="+E(pr.bio_markdown.replace(/[#*_`>\[\]()]/g," ").replace(/\s+/g," ").trim().slice(0,140));
  const wo=getWorkingOn(); if(wo) u+="&wo="+E(wo.slice(0,120));
  const lf=getLookingFor(); if(lf) u+="&lf="+E(lf.slice(0,120));
  return u; }
/* My own shareable contact — the phone/email I'm willing to hand the people I meet.
   PRIVATE by design: lives in localStorage, NEVER goes on the public claim page;
   it only rides the direct (iMessage) we-met-card send, to the one person I chose. */
function getMyPhone(){ return (localStorage.getItem("wim_my_phone")||"").trim(); }
function getMyEmail(){ return (localStorage.getItem("wim_my_email")||"").trim(); }
function hasMyContact(){ return !!(getMyPhone()||getMyEmail()); }
function makeMyVCard(){ const pr=HI.profile||{}, nm=getMyName(), parts=nm.trim().split(/\s+/);
  const L=["BEGIN:VCARD","VERSION:3.0","N:"+vcEscape(parts.length>1?parts.slice(1).join(" "):"")+";"+vcEscape(parts[0]||nm)+";;;","FN:"+vcEscape(nm)];
  if(pr.headline) L.push("TITLE:"+vcEscape(pr.headline));
  const ph=getMyPhone(), em=getMyEmail();
  if(ph) L.push("TEL;TYPE=CELL:"+vcEscape(ph));
  if(em) L.push("EMAIL;TYPE=INTERNET:"+vcEscape(em));
  if(pr.twitter_handle) L.push("X-SOCIALPROFILE;TYPE=twitter:https://x.com/"+pr.twitter_handle.replace(/^@+/,""));
  const myUrl=myLinktree(); if(myUrl) L.push("URL:"+vcEscape(myUrl));
  if(pr.website_url) L.push("URL:"+vcEscape(pr.website_url));
  if(pr.linkedin_url) L.push("URL:"+vcEscape(pr.linkedin_url));
  const av=myAvatar(); if(/^https?:\/\//.test(av)) L.push("PHOTO;VALUE=URI:"+av.replace(/[\s"'<>]/g,""));
  L.push("NOTE:"+vcEscape("We met — via Who I Met · HiRey"),"END:VCARD"); return L.join("\r\n"); }

/* Public "at a glance" substance — what you're working on / looking for. Renders inline on the
   shared page so the person you met can judge "should I connect" WITHOUT opening LinkedIn. */
function getWorkingOn(){ return (localStorage.getItem("wim_working_on")||"").trim() || ((HI.profile&&HI.profile.headline)||"").trim(); }

   my LIVE HiRey card (claim page intro mode, direct-reads /owner/{id}) + lets them
   save me to contacts. No photo-of-them, no we-met capture, no app on their side. */

  const lf=getLookingFor(); if(lf) u+="&lf="+E(lf.slice(0,120));
  if(pr.bio_markdown) u+="&bio="+E(pr.bio_markdown.replace(/[#*_`>\[\]()]/g," ").replace(/\s+/g," ").trim().slice(0,140));
  return u; }

async function authSend(){

  }catch(e){ _auth.busy=false; if(btn){ btn.textContent="Send code"; btn.disabled=false; }
    toast(e.message==="invalid_email"?"That email looks off":e.message==="invalid_phone"?"That phone looks off":e.message==="too_many_codes"?"Too many codes — wait a bit":"Could not send code"); }

async function authVerify(){

async function authGoogle(){

  try{
    const r=await HI.post("/v1/auth/web/google/start",{},false);

    if(!popup){ if(hint) hint.innerHTML=`<a href="${esc(r.authorize_url)}" target="_blank" rel="noopener" style="color:var(--blue);font-weight:600">Open Google sign-in ›</a> — then return here.`; }

      let pr; try{ pr=await HI.post("/v1/auth/web/google/poll",{flow_id:r.flow_id},false); }catch(e){ if(e.status===404) break; continue; }
      if(pr.status==="verified"){ try{ popup&&popup.close(); }catch(_){} await finishAuth(pr); return; }

async function hiSaveProfile(){
  const name=document.getElementById("hpName").value.trim();
  const headline=document.getElementById("hpHead").value.trim();
  const bio=document.getElementById("hpBio").value.trim();
  const x=document.getElementById("hpX").value.trim().replace(/^@+/,"");
  const norm=u=>{ u=(u||"").trim(); return u?(/^https?:\/\//i.test(u)?u:"https://"+u):""; };
  const site=norm(document.getElementById("hpSite").value);
  const li=norm(document.getElementById("hpLi").value);
  // "At a glance" rides the share link. Working on auto-fills from the headline — only persist a CUSTOM value
  // (≠ headline) so it never goes stale when the headline changes; Looking for is purely optional.
  const _woH=(document.getElementById("hpHead").value||"").trim(), _woV=(document.getElementById("hpWork").value||"").trim();
  localStorage.setItem("wim_working_on",(_woV&&_woV!==_woH)?_woV:"");
  localStorage.setItem("wim_looking_for",(document.getElementById("hpLook").value||"").trim());
  if(!name){ toast("Add your name"); return; }
  const btn=document.getElementById("hpSave"); btn.textContent="Saving…"; btn.disabled=true;
  try{
    const payload={action:"update_profile",display_name:name,headline,bio_markdown:bio,twitter_handle:x};
    if(site) payload.website_url=site; if(li) payload.linkedin_url=li;
    const r=await HI.call("hi.owners",payload);
    HI.profile=r.owner_profile||Object.assign({},HI.profile,{display_name:name,headline,bio_markdown:bio,twitter_handle:x,website_url:site,linkedin_url:li});
    const s=HI.session()||{}; s.display_name=name; HI.save(s);
    renderAll(); updateMe(); renderAccount(); toast("Profile saved");
  }catch(e){ btn.textContent="Save"; btn.disabled=false; toast(e.status===401?"Session expired — sign in again":"Could not save profile"); }
}
/* Become a connector (idempotent) then report a real, consented "I met them". */
async function hiInvite(pid){
  const p=personById(pid); if(!p) return;
  const inp=document.getElementById("hiContact"); const contact=(inp?inp.value:p.contact||"").trim();
  if(!contact){ toast("Add their email or phone first"); if(inp) inp.focus(); return; }
  const isEmail=/@/.test(contact);
  const btn=document.getElementById("hiSend"); if(btn){ btn.textContent="Sending…"; btn.disabled=true; }
  try{
    try{ await HI.call("hi.connectors",{action:"enroll"}); }catch(_){}
    const body={action:"report_met_person",permission_attested:true,display_name:p.name,when:"met"};
    if(isEmail) body.email=contact; else body.phone=contact;
    if(p.note) body.note=p.note;
    await HI.call("hi.connectors",body);
    p.contact=contact; p.invited=true; p.hiInvited=true; await dbPut("people",p);
    await hiRefreshConsent();
    renderPerson(pid); renderAll();
    toast(p.name.split(" ")[0]+" was invited to HiRey");
  }catch(e){ if(btn){ btn.textContent="Send HiRey invite"; btn.disabled=false; }
    toast(e.status===401?"Sign in again to invite":e.message==="invalid_phone"?"That phone looks off":"Could not send invite"); }
}
async function invitePerson(pid){ const p=personById(pid); if(!p) return;
  const first=p.name.split(" ")[0];
  const url=claimURL(p);
  const msg=first+", I met you today — claim your HiRey profile: "+url;
  const m=state.meetings.find(x=>x.personIds.includes(pid)&&x.photo);
  let sent=false;
  try{
    if(m&&m.photo&&navigator.canShare){ const file=new File([m.photo],"who-i-met.jpg",{type:m.photo.type||"image/jpeg"});
      if(navigator.canShare({files:[file]})){ await navigator.share({files:[file],text:msg,title:"HiRey"}); sent=true; } }
    if(!sent&&navigator.share){ await navigator.share({text:msg,url}); sent=true; }
  }catch(e){ if(e&&e.name==="AbortError") return; }
  if(!sent){ try{ await navigator.clipboard.writeText(msg); toast("Invite copied — paste it to "+first); }catch(_){ prompt("Copy this invite:",msg); } }
  if(!p.invited){ p.invited=true; await dbPut("people",p); renderPerson(pid); renderAll(); }
  if(sent) toast("Invite ready for "+first);
}

function loadImg(blob){ return new Promise((res,rej)=>{ const i=new Image(); const t=setTimeout(()=>rej(new Error("img_timeout")),4000); i.decoding="async"; i.onload=()=>{ clearTimeout(t); res(i); }; i.onerror=()=>{ clearTimeout(t); rej(new Error("img_error")); }; i.src=URL.createObjectURL(blob); }); }
async function makeCardBlob(meName, theirName, photoBlob, dateTs, accent){
  const W=1080, PH=980, BH=360, H=PH+BH, pad=64;
  const c=document.createElement("canvas"); c.width=W; c.height=H; const x=c.getContext("2d");
  x.fillStyle="#fbfaf7"; x.fillRect(0,0,W,H);
  if(photoBlob){ try{ const img=await loadImg(photoBlob); const s=Math.max(W/img.width,PH/img.height), dw=img.width*s, dh=img.height*s;
    x.drawImage(img,(W-dw)/2,(PH-dh)/2,dw,dh); }catch(_){ x.fillStyle="#efe9dd"; x.fillRect(0,0,W,PH); x.fillStyle=accent||"#8a5c00"; x.font="600 240px 'Iowan Old Style',Palatino,Georgia,serif"; x.textAlign="center"; x.textBaseline="middle"; x.fillText(initials(theirName),W/2,PH/2); x.textAlign="left"; x.textBaseline="alphabetic"; } }
  else { x.fillStyle="#efe9dd"; x.fillRect(0,0,W,PH); x.fillStyle=accent||"#8a5c00";
    x.font="600 240px 'Iowan Old Style',Palatino,Georgia,serif"; x.textAlign="center"; x.textBaseline="middle";
    x.fillText(initials(theirName),W/2,PH/2); x.textAlign="left"; x.textBaseline="alphabetic"; }
  x.fillStyle="#fbfaf7"; x.fillRect(0,PH,W,BH);
  x.fillStyle=accent||"#34c759"; x.beginPath(); x.arc(pad+7,PH+72,9,0,Math.PI*2); x.fill();
  try{x.letterSpacing="5px";}catch(_){}
  x.fillStyle="rgba(22,20,18,.5)"; x.font="600 28px -apple-system,Inter,Helvetica,Arial,sans-serif"; x.fillText("WE MET", pad+30, PH+82);
  try{x.letterSpacing="0px";}catch(_){}
  const names=meName+"   ×   "+theirName; x.fillStyle="#161412"; let fs=74; x.font="600 "+fs+"px 'Iowan Old Style',Palatino,Georgia,serif";
  while(x.measureText(names).width>W-2*pad&&fs>32){ fs-=2; x.font="600 "+fs+"px 'Iowan Old Style',Palatino,Georgia,serif"; }
  x.fillText(names, pad, PH+178);
  x.fillStyle="rgba(22,20,18,.5)"; x.font="400 30px -apple-system,Inter,Helvetica,Arial,sans-serif";
  x.fillText(new Date(dateTs||Date.now()).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"}), pad, PH+228);
  x.textAlign="right"; x.fillStyle="#161412"; x.font="italic 600 32px 'Iowan Old Style',Palatino,Georgia,serif"; x.fillText("HiRey", W-pad, PH+292);
  x.fillStyle="rgba(22,20,18,.4)"; x.font="400 22px -apple-system,sans-serif"; x.fillText("hirey.ai", W-pad, PH+326);
  x.textAlign="left";
  return new Promise(res=>c.toBlob(res,"image/jpeg",.92));
}
async function shareCard(cardBlob, p, includeContact){ const first=p.name.split(" ")[0];
  const url=claimURL(p);
  let text="Great meeting you, "+first+"! Here's our card — claim your own HiRey page (people and their agents find you there) and connect back: "+url;
  const cardFile=new File([cardBlob],"we-met.jpg",{type:"image/jpeg"});
  const files=[cardFile]; const share=includeContact&&hasMyContact();
  if(share){ try{ files.push(makeMyVCardFile()); }catch(_){} }
  const canMulti=!!(navigator.canShare&&files.length>1&&navigator.canShare({files}));
  // If the vCard file can't ride along, fold the private contact into the message text — same private channel, still only this person.
  if(share&&!canMulti){ const c=[getMyPhone(),getMyEmail()].filter(Boolean).join("  ·  "); if(c) text+="\n\nReach me directly: "+c; }
  let sent=false;
  try{
    if(canMulti){ await navigator.share({files,text,title:"HiRey"}); sent=true; }
    else if(navigator.canShare&&navigator.canShare({files:[cardFile]})){ await navigator.share({files:[cardFile],text,title:"HiRey"}); sent=true; }
    else if(navigator.share){ await navigator.share({text,url}); sent=true; }
  }catch(e){ if(e&&e.name==="AbortError") return false; }
  if(!sent){ try{ await navigator.clipboard.writeText(text); toast("Link copied — paste it to "+first); }catch(_){}
    const a=document.createElement("a"); a.href=URL.createObjectURL(cardBlob); a.download="we-met-"+first+".jpg"; document.body.appendChild(a); a.click(); a.remove(); }
  if(!p.invited){ p.invited=true; await dbPut("people",p); renderAll(); }
  return sent;
}
async function shareCardPublic(cardBlob, p){ const first=p.name.split(" ")[0];
  const myUrl=myLinktree(); const text="Met "+p.name+" today 🤝  ·  I'm on HiRey → "+(myUrl||"hirey.ai");
  let sent=false;
  try{ const file=new File([cardBlob],"we-met.jpg",{type:"image/jpeg"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],text,title:"Who I Met"}); sent=true; }
    else if(navigator.share){ await navigator.share({text}); sent=true; }
  }catch(e){ if(e&&e.name==="AbortError") return false; }
  if(!sent){ try{ await navigator.clipboard.writeText(text); }catch(_){} const a=document.createElement("a"); a.href=URL.createObjectURL(cardBlob); a.download="we-met-"+first+".jpg"; document.body.appendChild(a); a.click(); a.remove(); toast("Card saved — post it anywhere"); }
  return sent;
}
async function presentCard(pid, opt){ const p=personById(pid); if(!p) return;
  const m=state.meetings.find(x=>x.personIds.includes(pid)&&x.photo);
  let card=null, cardURL=""; try{ card=await makeCardBlob(getMyName(), p.name, m&&m.photo, (m&&m.createdAt)||Date.now(), pcolor(p.name).a); cardURL=URL.createObjectURL(card); }catch(_){}
  const first=p.name.split(" ")[0];
  document.getElementById(opt.sheet).innerHTML=`
    <div class="grip"></div>
    <span class="eyebrow sec" style="margin:6px 0 12px">Your we-met card</span>
    <div class="preview-wrap" style="background:transparent;box-shadow:0 8px 22px rgba(20,18,16,.12);border-radius:14px;overflow:hidden">${cardURL?`<img src="${cardURL}" style="object-fit:contain;max-height:56vh">`:`<div class="ct" style="padding:38px;text-align:center">Couldn’t render the card — tap Share to send a link.</div>`}</div>
    <p style="font-size:14px;color:var(--ink-soft);margin:12px 0 0">Send it to ${esc(first)} — you both keep a copy.</p>
    ${hasMyContact()
      ? `<label style="display:flex;align-items:flex-start;gap:10px;margin:14px 2px 0;font-size:13px;color:var(--ink-soft);line-height:1.45;cursor:pointer"><input type="checkbox" id="incContact" checked style="width:18px;height:18px;margin-top:1px;accent-color:var(--green);flex:0 0 auto"><span>Also share my <b style="color:var(--ink)">phone &amp; email</b> with ${esc(first)} — privately, never on your public page.</span></label>`
      : `<button class="btn-soft" id="addMyContact" style="margin-top:12px">＋ Add your phone &amp; email to share privately with ${esc(first)}</button>`}
    <div class="sheet-actions"><button class="btn btn-ghost" id="cardBack">${opt.backLabel||"Back"}</button><button class="btn btn-primary" id="cardShare">Send to ${esc(first)}</button></div>
    <button class="btn btn-ghost" id="cardPost" style="width:100%;margin-top:8px">Post to social instead</button>`;
  showSheet(opt.sheet, opt.scrim);
  document.getElementById("cardBack").onclick=()=>opt.onBack();
  const addC=document.getElementById("addMyContact"); if(addC) addC.onclick=()=>myContactEditor();
  document.getElementById("cardShare").onclick=async()=>{ if(!card){ opt.onBack(); return; }
    const inc=document.getElementById("incContact"); const ok=await shareCard(card,p,inc?inc.checked:false); opt.onBack(); if(ok) toast("Card sent to "+first); };
  document.getElementById("cardPost").onclick=async()=>{ if(!card){ opt.onBack(); return; } await shareCardPublic(card,p); opt.onBack(); };
}
function sendCard(pid){ return presentCard(pid,{sheet:"sheet2",scrim:"scrim2",backLabel:"Back",onBack:()=>renderPerson(pid)}); }

function monoBlob(seed){ return new Promise(res=>{ const c=document.createElement("canvas"); c.width=640; c.height=800;
  const x=c.getContext("2d"); const col=pcolor(seed); x.fillStyle=col.t.replace(/[\d.]+\)$/,"1)"); x.fillStyle="#f3efe6"; x.fillRect(0,0,640,800);
  x.fillStyle=col.t; x.fillRect(0,0,640,800);
  x.fillStyle=col.d; x.font="600 250px "+getComputedStyle(document.body).getPropertyValue("--serif");
  x.textAlign="center"; x.textBaseline="middle"; x.fillText(initials(seed),320,420); c.toBlob(res,"image/jpeg",.88); }); }
